<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Music Video Studio — Prototype</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<style>
  :root{
    --bg-app:#15171b;
    --bg-panel:#1b1e24;
    --bg-panel-2:#20232a;
    --bg-elevated:#262a32;
    --line:#2b2f38;
    --line-soft:#22252c;
    --text-1:#e7e7e4;
    --text-2:#9498a0;
    --text-3:#5e626c;
    --accent:#e0983c;
    --accent-dim:#3a2f1e;
    --accent-text:#f2b968;
    --ok:#5fae7a;
    --danger:#d9695f;
    --font-ui:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html, body{margin:0;height:100%;font-family:var(--font-ui);zoom:1.2;}
  #app{
    background:var(--bg-app);
    color:var(--text-1);
    overflow:hidden;
    font-size:13px;
    display:flex;
    flex-direction:column;
    height:100vh;
    width:100vw;
  }
  /* ---- Top bar ---- */
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:0 14px;height:44px;flex:0 0 auto;
    background:var(--bg-panel);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:500;color:var(--text-1);}
  .brand i{color:var(--accent);font-size:18px;}
  .menu{display:flex;gap:14px;color:var(--text-2);font-size:12.5px;}
  .menu span:hover{color:var(--text-1);cursor:default;}
  .proj-title{margin-left:auto;margin-right:auto;color:var(--text-2);font-size:12.5px;}
  .proj-title b{color:var(--text-1);font-weight:500;}
  .topbar-actions{display:flex;gap:6px;}
  .tbtn{
    display:flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--line);color:var(--text-2);
    padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font-ui);
    cursor:pointer;
  }
  .tbtn:hover{border-color:#3a3e48;color:var(--text-1);background:var(--bg-elevated);}
  .tbtn.primary{background:var(--accent-dim);border-color:#5a4526;color:var(--accent-text);}
  .tbtn.primary:hover{background:#4a381f;}

  /* ---- Body layout ---- */
  .body-row{flex:1 1 auto;display:flex;min-height:0;}

  /* ---- Left assets panel ---- */
  .assets{
    width:220px;flex:0 0 auto;background:var(--bg-panel);
    border-right:1px solid var(--line);overflow-y:auto;padding:8px 0;
  }
  .cat{user-select:none;}
  .cat-head{
    display:flex;align-items:center;gap:6px;padding:6px 6px 6px 12px;cursor:pointer;color:var(--text-1);
  }
  .cat-head:hover{background:var(--bg-panel-2);}
  .cat-head:hover .cat-add{opacity:1;}
  .cat-head i.chev{font-size:13px;color:var(--text-3);transition:transform .12s;flex:0 0 auto;}
  .cat-head.collapsed i.chev{transform:rotate(-90deg);}
  .cat-head i.folder{font-size:15px;color:var(--text-2);flex:0 0 auto;}
  .cat-name{flex:1 1 auto;}
  .cat-count{color:var(--text-3);font-size:11px;font-family:var(--font-mono);margin-right:2px;}
  .cat-add{
    opacity:.5;flex:0 0 auto;width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .cat-head:hover .cat-add{opacity:1;}
  .cat-add:hover{background:var(--bg-elevated);color:var(--accent-text);opacity:1;}
  .cat-add i{font-size:14px;}
  .cat-items{padding-left:8px;}
  .cat-items.hidden{display:none;}
  .item{
    display:flex;align-items:center;gap:7px;padding:5px 8px 5px 26px;color:var(--text-2);
    cursor:pointer;border-left:2px solid transparent;font-size:12.5px;position:relative;
  }
  .item:hover{background:var(--bg-panel-2);color:var(--text-1);}
  .item:hover .item-del{opacity:1;}
  .item.selected{color:var(--text-1);background:var(--bg-panel-2);border-left-color:var(--accent);}
  .item i.itype{font-size:14px;color:var(--text-3);flex:0 0 auto;}
  .item-avatar{
    width:18px;height:18px;border-radius:50%;flex:0 0 auto;
    background:var(--bg-elevated);background-size:cover;background-position:center;
  }
  .item-name{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:0 0 auto;}
  .item-del{
    opacity:.4;flex:0 0 auto;width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);
  }
  .item:hover .item-del{opacity:1;}
  .item-del:hover{background:var(--bg-elevated);color:var(--danger);}
  .item-del i{font-size:13px;}
  .empty-cat{padding:5px 12px 8px 26px;color:var(--text-3);font-size:11.5px;font-style:italic;}

  /* ---- Center column ---- */
  .center{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;}
  .preview-bar{
    display:flex;align-items:center;gap:10px;padding:6px 12px;
    border-bottom:1px solid var(--line);color:var(--text-2);font-size:12px;flex:0 0 auto;
  }
  .preview{
    flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center, #23262d 0%, #16181c 78%);
    position:relative;min-height:0;overflow-y:auto;padding:24px;
  }
  .preview.align-tl{align-items:flex-start;justify-content:flex-start;}
  .empty-preview{
    display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-3);
  }
  .empty-preview i{font-size:34px;color:#4a4d54;}
  .empty-preview .t1{font-size:13px;color:var(--text-2);}
  .empty-preview .t2{font-size:12px;color:var(--text-3);}

  /* ---- Character gallery (tile grid) ---- */
  .char-gallery{width:100%;max-width:760px;}
  .char-grid{
    display:grid;grid-template-columns:repeat(auto-fill, 108px);gap:16px;
  }
  .char-tile{
    width:108px;cursor:pointer;position:relative;
  }
  .char-tile-photo{
    width:108px;height:108px;border-radius:8px;border:1px solid var(--line);
    background:var(--bg-panel-2);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  }
  .char-tile-photo i{font-size:32px;color:var(--text-3);}
  .char-tile:hover .char-tile-photo{border-color:#3a3e48;}
  .char-tile-name{
    margin-top:6px;font-size:12px;color:var(--text-2);text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .char-tile-role{
    font-size:10.5px;color:var(--text-3);text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .char-tile-del{
    position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:5px;
    background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;
    opacity:.55;
  }
  .char-tile-del:hover{background:rgba(217,105,95,.85);opacity:1;}
  .char-tile:hover .char-tile-del{opacity:1;}
  .char-tile-del i{font-size:13px;}
  .char-tile-add .char-tile-photo{
    border-style:dashed;background:transparent;
  }
  .char-tile-add:hover .char-tile-photo{border-color:var(--accent);}
  .char-tile-add:hover .char-tile-photo i{color:var(--accent-text);}
  .char-tile-add .char-tile-name{color:var(--text-3);}

  /* ---- Character card ---- */
  .char-card{
    width:100%;max-width:420px;background:var(--bg-panel);border:1px solid var(--line);
    border-radius:10px;overflow:hidden;align-self:center;
  }
  .char-card-photo{
    width:100%;aspect-ratio:4/3;max-height:360px;background:var(--bg-panel-2);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);
  }
  .char-card-photo svg{width:40px;height:40px;}
  .char-card-body{padding:16px 18px;}
  .char-card-name{font-size:16px;font-weight:500;color:var(--text-1);margin:0 0 3px;}
  .char-card-role{
    display:inline-block;font-size:11px;color:var(--accent-text);background:var(--accent-dim);
    padding:3px 8px;border-radius:5px;margin-bottom:12px;
  }
  .char-card-desc{font-size:12.5px;color:var(--text-2);line-height:1.6;margin:0 0 14px;white-space:pre-wrap;}
  .char-card-section-title{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;}
  .char-card-angles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .char-card-angle{
    width:48px;height:48px;border-radius:6px;border:1px solid var(--line);
    background-size:cover;background-position:center;background-color:var(--bg-panel-2);
  }
  .char-card-actions{display:flex;justify-content:space-between;gap:8px;}

  /* ---- AI reference generation ---- */
  .gen-section{border-top:1px solid var(--line);margin-top:14px;padding-top:14px;}
  .gen-btn{
    width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
    padding:9px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;border:1px solid #5a4526;
    background:var(--accent-dim);color:var(--accent-text);font-family:var(--font-ui);
  }
  .gen-btn:hover{background:#4a381f;}
  .gen-btn:disabled{opacity:.6;cursor:default;}
  .gen-cost{
    font-family:var(--font-mono);font-size:10.5px;color:var(--accent-text);opacity:.85;
    background:rgba(0,0,0,.18);padding:2px 6px;border-radius:4px;
  }
  .gen-hint{font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.5;}
  .gen-spin{
    width:12px;height:12px;border-radius:50%;border:2px solid rgba(242,185,104,.35);
    border-top-color:var(--accent-text);animation:gen-spin-rot .7s linear infinite;flex:0 0 auto;
  }
  @keyframes gen-spin-rot{to{transform:rotate(360deg);}}
  .ref-status{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ok);margin-bottom:10px;
  }
  .ref-status .dot2{width:6px;height:6px;border-radius:50%;background:var(--ok);}
  .ref-card-box{
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-family:var(--font-mono);font-size:11px;line-height:1.6;
    white-space:pre-wrap;color:var(--text-2);max-height:220px;overflow-y:auto;margin-bottom:10px;
  }
  .ref-actions{display:flex;gap:8px;}
  .ref-actions .cf-btn{flex:1 1 auto;}

  /* ---- Character creation form ---- */
  .char-form{
    width:100%;max-width:420px;background:var(--bg-panel);border:1px solid var(--line);
    border-radius:10px;padding:18px;align-self:center;
  }
  .char-form h3{margin:0 0 3px;font-size:15px;font-weight:500;color:var(--text-1);}
  .char-form .sub{margin:0 0 16px;font-size:12px;color:var(--text-3);}
  .photo-drop{
    width:100%;aspect-ratio:4/3;max-height:340px;border-radius:8px;border:1px dashed var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    color:var(--text-3);cursor:pointer;margin-bottom:16px;background:var(--bg-panel-2);
    background-size:cover;background-position:center;position:relative;overflow:hidden;
  }
  .photo-drop:hover{border-color:#3a3e48;color:var(--text-2);}
  .photo-drop svg{flex:0 0 auto;}
  .photo-drop span{font-size:12px;}
  .photo-drop.has-photo span, .photo-drop.has-photo svg{display:none;}
  .photo-drop .photo-remove{
    position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:5px;
    background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;color:#fff;
  }
  .photo-drop.has-photo .photo-remove{display:flex;}
  .cf-field{margin-bottom:12px;}
  .cf-field label{display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;}
  .cf-field input[type=text], .cf-field select, .cf-field textarea{
    width:100%;background:var(--bg-elevated);border:1px solid var(--line);color:var(--text-1);
    border-radius:5px;padding:7px 9px;font-size:12.5px;font-family:var(--font-ui);
  }
  .cf-field input:focus, .cf-field select:focus, .cf-field textarea:focus{outline:none;border-color:var(--accent);}
  .cf-field textarea{resize:vertical;min-height:52px;line-height:1.5;}
  .angles-row{display:flex;flex-wrap:wrap;gap:8px;}
  .angle-tile{
    width:52px;height:52px;border-radius:6px;border:1px solid var(--line);
    background:var(--bg-panel-2);background-size:cover;background-position:center;
    position:relative;flex:0 0 auto;
  }
  .angle-tile-del{
    position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:4px;
    background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;color:#fff;
    opacity:.6;
  }
  .angle-tile-del:hover{background:rgba(217,105,95,.85);opacity:1;}
  .angle-tile-add{
    width:52px;height:52px;border-radius:6px;border:1px dashed var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--text-3);cursor:pointer;flex:0 0 auto;
  }
  .angle-tile-add:hover{border-color:var(--accent);color:var(--accent-text);}
  .cf-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .cf-btn{
    padding:7px 14px;border-radius:6px;font-size:12.5px;cursor:pointer;border:1px solid var(--line);
    background:transparent;color:var(--text-2);
  }
  .cf-btn:hover{color:var(--text-1);border-color:#3a3e48;}
  .cf-btn.primary{background:var(--accent-dim);border-color:#5a4526;color:var(--accent-text);}
  .cf-btn.primary:hover{background:#4a381f;}
  .cf-btn.primary:disabled{opacity:.45;cursor:default;background:var(--accent-dim);}

  /* ---- Bottom audio track ---- */
  .timeline-area{border-top:1px solid var(--line);background:var(--bg-panel);flex:0 0 auto;}
  .timeline-scenes{padding:10px 12px 6px;overflow-x:auto;border-bottom:1px solid var(--line-soft);}
  .timeline-track{display:flex;gap:4px;position:relative;min-height:54px;}
  .scene-block{
    flex:0 0 100px;background:var(--bg-elevated);border:1px solid var(--line);border-radius:6px;
    padding:6px 8px;cursor:pointer;position:relative;display:flex;flex-direction:column;
    justify-content:space-between;
  }
  .scene-block.focused{border-color:var(--accent);}
  .scene-block.expanded{background:transparent;border:none;padding:0;flex-direction:row;gap:4px;flex:0 0 auto;}
  .shot-block{
    flex:0 0 60px;background:var(--bg-panel-2);border:1px solid var(--line);border-radius:5px;
    padding:5px 7px;cursor:pointer;position:relative;display:flex;flex-direction:column;
    justify-content:space-between;
  }
  .shot-block.focused{border-color:var(--accent);}
  .scene-name{font-size:11.5px;color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .scene-meta{font-size:10px;color:var(--text-3);font-family:var(--font-mono);}
  .scene-rename-input{
    width:100%;background:var(--bg-app);border:1px solid var(--accent);color:var(--text-1);
    font-size:11.5px;border-radius:4px;padding:1px 3px;font-family:var(--font-ui);
  }
  .block-del{
    position:absolute;top:3px;right:3px;width:15px;height:15px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);opacity:.55;
  }
  .block-del:hover{background:var(--bg-app);color:var(--danger);opacity:1;}
  .block-rename{
    position:absolute;top:3px;right:21px;width:15px;height:15px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);opacity:.55;
  }
  .block-rename:hover{background:var(--bg-app);color:var(--accent-text);opacity:1;}
  .add-block{
    border:1px dashed var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;
    color:var(--text-3);cursor:pointer;
  }
  .add-block:hover{border-color:var(--accent);color:var(--accent-text);}
  .playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);pointer-events:none;z-index:2;}
  .playhead::before{
    content:'';position:absolute;top:-4px;left:-4px;width:10px;height:8px;background:var(--accent);
    clip-path:polygon(0 0,100% 0,50% 100%);
  }
  .timeline-frame{
    width:78%;aspect-ratio:16/9;border-radius:6px;border:1px solid var(--line);
    background:linear-gradient(135deg,#242024 0%,#1a1a1e 55%,#101012 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#6a6660;
  }
  .timeline-frame i{font-size:30px;}
  .timeline-frame .plabel{font-family:var(--font-mono);font-size:11px;color:#84807a;}
  .waveform{display:flex;align-items:center;gap:8px;padding:10px 12px;}
  .waveform i{color:var(--text-2);font-size:15px;}
  .waveform .track-name{font-size:11.5px;color:var(--text-2);width:150px;flex:0 0 auto;}
  .wave-canvas{flex:1 1 auto;height:36px;}
  .no-track{padding:14px 12px;color:var(--text-3);font-size:12px;font-style:italic;}

  /* ---- Right inspector ---- */
  .inspector{
    width:230px;flex:0 0 auto;background:var(--bg-panel);border-left:1px solid var(--line);
    overflow-y:auto;
  }
  .insp-tabs{display:flex;border-bottom:1px solid var(--line);}
  .insp-tab{padding:9px 12px;font-size:12px;color:var(--text-3);cursor:default;border-bottom:2px solid transparent;}
  .insp-tab.active{color:var(--text-1);border-bottom-color:var(--accent);}
  .insp-empty{padding:16px 14px;color:var(--text-3);font-size:12px;line-height:1.6;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#33373f;border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand"><i class="ti ti-movie"></i>AI Music Video Studio</div>
    <div class="menu"><span>File</span><span>Edit</span><span>Project</span><span>Tools</span><span>Help</span></div>
    <div class="proj-title">New project — <b>Untitled</b></div>
    <div class="topbar-actions">
      <button class="tbtn"><i class="ti ti-device-floppy"></i>Save</button>
      <button class="tbtn primary"><i class="ti ti-player-play"></i>Render <span class="gen-cost" style="margin-left:2px;">~$0.30/shot</span></button>
    </div>
  </div>

  <div class="body-row">

    <div class="assets" id="assets"></div>

    <div class="center">
      <div class="preview-bar" id="previewBar">Preview</div>
      <div class="preview" id="preview"></div>

      <div class="timeline-area">
        <div class="timeline-scenes" id="timelineScenes"></div>
        <div id="waveformWrap"></div>
      </div>
    </div>

    <div class="inspector">
      <div class="insp-tabs">
        <div class="insp-tab active">Inspector</div>
        <div class="insp-tab">Scene settings</div>
      </div>
      <div id="inspBody">
        <div class="insp-empty">No shot selected.<br>Create a scene and a shot to see its parameters here.</div>
      </div>
    </div>

  </div>
</div>

<script>
// ---------- state ----------
const state = {
  categories: [
    {key:'music', name:'Music', icon:'ti-music', addType:null, items:[
      {name:'Enter Sandman.mp3', icon:'ti-file-music'},
    ]},
    {key:'band', name:'Band / Characters', icon:'ti-users', addType:'character', items:[]},
    {key:'locations', name:'Locations', icon:'ti-map-pin', addType:'generic', items:[]},
    {key:'objects', name:'Objects', icon:'ti-cube', addType:'generic', items:[]},
    {key:'effects', name:'Effects', icon:'ti-sparkles', addType:'generic', items:[]},
    {key:'camera', name:'Camera & lenses', icon:'ti-aperture', addType:'generic', items:[]},
    {key:'luts', name:'LUTs / looks', icon:'ti-color-swatch', addType:'generic', items:[]},
  ],
  scenes: []
};

let sceneSeq = 1, shotSeq = 1;
let expandedSceneId = null;
let focus = { sceneId: null, shotId: null };

const assetsEl = document.getElementById('assets');
const previewEl = document.getElementById('preview');
const previewBarEl = document.getElementById('previewBar');
const waveformWrap = document.getElementById('waveformWrap');
const timelineScenesEl = document.getElementById('timelineScenes');

function trashSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>`;
}
function pencilSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"></path></svg>`;
}

// ---------- timeline: scenes / shots / playhead ----------
function addScene(){
  const id = 's' + (sceneSeq++);
  state.scenes.push({ id, name: 'Scene ' + (state.scenes.length + 1), shots: [] });
  expandedSceneId = id;
  focus = { sceneId: id, shotId: null };
  renderTimelineScenes();
  showTimelineFocusPreview();
}
function addShot(sceneId){
  const scene = state.scenes.find(s=>s.id===sceneId);
  if(!scene) return;
  const id = 'sh' + (shotSeq++);
  scene.shots.push({ id, name: 'Shot ' + (scene.shots.length + 1), duration: 2 });
  focus = { sceneId, shotId: id };
  renderTimelineScenes();
  showTimelineFocusPreview();
}
function deleteScene(id){
  state.scenes = state.scenes.filter(s=>s.id!==id);
  if(expandedSceneId===id) expandedSceneId = null;
  if(focus.sceneId===id) focus = { sceneId:null, shotId:null };
  renderTimelineScenes();
  showTimelineFocusPreview();
}
function deleteShot(sceneId, shotId){
  const scene = state.scenes.find(s=>s.id===sceneId);
  if(!scene) return;
  scene.shots = scene.shots.filter(sh=>sh.id!==shotId);
  if(focus.shotId===shotId) focus = { sceneId, shotId:null };
  renderTimelineScenes();
  showTimelineFocusPreview();
}
function toggleExpand(sceneId){
  expandedSceneId = expandedSceneId===sceneId ? null : sceneId;
  renderTimelineScenes();
}
function setFocus(sceneId, shotId){
  focus = { sceneId, shotId };
  renderTimelineScenes();
  showTimelineFocusPreview();
}
function startRenameScene(id, labelEl){
  const scene = state.scenes.find(s=>s.id===id);
  if(!scene) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = scene.name;
  input.className = 'scene-rename-input';
  labelEl.replaceWith(input);
  input.focus();
  input.select();
  function commit(){
    scene.name = input.value.trim() || scene.name;
    renderTimelineScenes();
    if(focus.sceneId===id) showTimelineFocusPreview();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.blur(); });
}

function renderTimelineScenes(){
  if(!timelineScenesEl) return;

  if(state.scenes.length===0){
    timelineScenesEl.innerHTML = `
      <div class="timeline-track">
        <div class="add-block" id="addSceneBtn" style="flex:0 0 100px;height:54px;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </div>
      </div>`;
    document.getElementById('addSceneBtn').onclick = addScene;
    return;
  }

  let html = '<div class="timeline-track" id="timelineTrack">';
  state.scenes.forEach(scene=>{
    const isExpanded = expandedSceneId===scene.id;
    const isFocusedScene = focus.sceneId===scene.id && !focus.shotId;
    if(!isExpanded){
      html += `
        <div class="scene-block${isFocusedScene?' focused':''}" data-scene="${scene.id}">
          <div class="block-del" data-del-scene="${scene.id}" title="Delete scene">${trashSvg(10)}</div>
          <div class="block-rename" data-rename-btn-scene="${scene.id}" title="Rename">${pencilSvg(9)}</div>
          <div class="scene-name" data-rename-scene="${scene.id}">${scene.name}</div>
          <div class="scene-meta">${scene.shots.length} shot${scene.shots.length===1?'':'s'}</div>
        </div>`;
    } else {
      html += `<div class="scene-block expanded" data-scene="${scene.id}">`;
      scene.shots.forEach(shot=>{
        const isFocusedShot = focus.shotId===shot.id;
        html += `
          <div class="shot-block${isFocusedShot?' focused':''}" data-scene="${scene.id}" data-shot="${shot.id}">
            <div class="block-del" data-del-shot="${scene.id}|${shot.id}" title="Delete shot">${trashSvg(9)}</div>
            <div class="scene-name" style="font-size:10.5px;">${shot.name}</div>
            <div class="scene-meta">${shot.duration}s</div>
          </div>`;
      });
      html += `
          <div class="add-block" data-add-shot="${scene.id}" style="flex:0 0 40px;height:54px;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </div>
        </div>`;
    }
  });
  html += `
      <div class="add-block" id="addSceneBtn" style="flex:0 0 60px;height:54px;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
    </div>`;
  timelineScenesEl.innerHTML = html;

  document.getElementById('addSceneBtn').onclick = addScene;
  timelineScenesEl.querySelectorAll('[data-add-shot]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); addShot(el.dataset.addShot); };
  });
  timelineScenesEl.querySelectorAll('[data-del-scene]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); deleteScene(el.dataset.delScene); };
  });
  timelineScenesEl.querySelectorAll('[data-del-shot]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); const [sid,shid]=el.dataset.delShot.split('|'); deleteShot(sid,shid); };
  });
  timelineScenesEl.querySelectorAll('.scene-block:not(.expanded)').forEach(el=>{
    el.onclick = ()=>{ const sid=el.dataset.scene; toggleExpand(sid); setFocus(sid, null); };
  });
  timelineScenesEl.querySelectorAll('.shot-block').forEach(el=>{
    el.onclick = ()=> setFocus(el.dataset.scene, el.dataset.shot);
  });
  timelineScenesEl.querySelectorAll('[data-rename-btn-scene]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.dataset.renameBtnScene;
      const label = timelineScenesEl.querySelector(`[data-rename-scene="${id}"]`);
      if(label) startRenameScene(id, label);
    };
  });

  positionPlayhead();
}

function positionPlayhead(){
  const track = document.getElementById('timelineTrack');
  if(!track) return;
  const old = document.getElementById('timelinePlayhead');
  if(old) old.remove();
  if(!focus.sceneId) return;
  let targetEl = focus.shotId
    ? track.querySelector(`.shot-block[data-shot="${focus.shotId}"]`)
    : track.querySelector(`.scene-block[data-scene="${focus.sceneId}"]`);
  if(!targetEl) return;
  const marker = document.createElement('div');
  marker.className = 'playhead';
  marker.id = 'timelinePlayhead';
  marker.style.left = targetEl.offsetLeft + 'px';
  track.appendChild(marker);
}

function showTimelineFocusPreview(){
  previewEl.classList.remove('align-tl');
  previewEl.onclick = null;

  if(!focus.sceneId){
    previewBarEl.textContent = 'Preview';
    previewEl.innerHTML = `
      <div class="empty-preview">
        <i class="ti ti-clapperboard"></i>
        <div class="t1">${state.scenes.length===0 ? 'No scenes yet' : 'No shot selected'}</div>
        <div class="t2">${state.scenes.length===0 ? 'Add your first scene from the timeline below.' : 'Click a scene to expand it, then pick a shot to preview.'}</div>
      </div>`;
    renderInspectorPanel();

  }

  const scene = state.scenes.find(s=>s.id===focus.sceneId);

  previewBarEl.textContent = shot ? `${scene.name} — ${shot.name}` : scene.name;

  const body = document.getElementById('inspBody');

  if(!scene){ body.innerHTML = `<div class="insp-empty">No shot selected.</div>`; return; }

  if(!focus.shotId){
    body.innerHTML = `<div class="insp-empty">Scene selected: <span style="color:var(--text-1);">${scene.name}</span><br>Pick a shot inside it to edit its parameters.</div>`;
    return;
  }

// ---------- helpers: image loading (with TIFF decode support) ----------
function loadImageAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const isTiff = /\.tiff?$/i.test(file.name) || file.type==='image/tiff' || file.type==='image/tif';
    if(isTiff && window.UTIF){
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const buffer = reader.result;
          const ifds = UTIF.decode(buffer);
          UTIF.decodeImage(buffer, ifds[0]);
          const rgba = UTIF.toRGBA8(ifds[0]);
          const canvas = document.createElement('canvas');
          canvas.width = ifds[0].width;
          canvas.height = ifds[0].height;
          const ctx = canvas.getContext('2d');
          const imgData = ctx.createImageData(ifds[0].width, ifds[0].height);
          imgData.data.set(rgba);
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL('image/png'));
        } catch(err){
          // fall back to a plain data URL if decoding fails
          const fr2 = new FileReader();
          fr2.onload = ()=> resolve(fr2.result);
          fr2.onerror = reject;
          fr2.readAsDataURL(file);
        }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    }
  });
}
function applyNaturalAspect(el, dataUrl){
  if(!dataUrl) return;
  const img = new Image();
  img.onload = ()=>{
    if(img.naturalWidth && img.naturalHeight){
      el.style.aspectRatio = img.naturalWidth + ' / ' + img.naturalHeight;
    }
  };
  img.src = dataUrl;
}

// ---------- AI reference card (mocked KIE generation) ----------
const GEN_MODEL_LABEL = 'KIE · GPT-Image-1';
const GEN_COST_LABEL = '$0.03';

function buildReferenceCardText(it){
  const lines = [];
  lines.push('# CHARACTER REFERENCE CARD');
  lines.push('name: ' + it.name);
  if(it.role) lines.push('role: ' + it.role);
  lines.push('primary_photo: ' + (it.photo ? 'attached (1)' : 'none'));
  lines.push('angle_refs: ' + ((it.angles && it.angles.length) || 0) + ' attached');
  if(it.description) lines.push('description: ' + it.description);
  lines.push('');
  lines.push('consistency_rule:');
  lines.push('  Always render this character matching the face, hair, build');
  lines.push('  and wardrobe captured above. Only deviate when a shot');
  lines.push('  explicitly overrides a detail (e.g. "wet", "no jacket",');
  lines.push('  "bloodied lip") — those overrides apply to that shot only');
  lines.push('  and reset on the next one unless carried forward.');
  return lines.join('\n');
}

function renderGenBlock(sectionEl, data, refText, onGenerate){
  if(!sectionEl) return;
  const hasAllData = !!(data.name && data.photo && data.role && data.description);

  if(!hasAllData){
    sectionEl.innerHTML = `<div class="gen-hint">Add a photo, role and description to generate this character's AI reference card.</div>`;
    return;
  }

  if(refText){
    sectionEl.innerHTML = `
      <div class="ref-status"><span class="dot2"></span>Reference card generated</div>
      <div class="ref-card-box">${refText}</div>
      <div class="ref-actions">
        <button class="cf-btn" id="genRegenBtn">Regenerate <span class="gen-cost">${GEN_COST_LABEL}</span></button>
      </div>`;
    sectionEl.querySelector('#genRegenBtn').onclick = ()=> runGenBlock(sectionEl, data, onGenerate);
  } else {
    sectionEl.innerHTML = `
      <button class="gen-btn" id="genBtn">Generate this character for AI use <span class="gen-cost">${GEN_COST_LABEL}</span></button>
      <div class="gen-hint">Generates a structured, AI-readable reference (via ${GEN_MODEL_LABEL}) that future shot generations will point to, so this character stays consistent from shot to shot.</div>`;
    sectionEl.querySelector('#genBtn').onclick = ()=> runGenBlock(sectionEl, data, onGenerate);
  }
}

function runGenBlock(sectionEl, data, onGenerate){
  if(!sectionEl) return;
  sectionEl.innerHTML = `<button class="gen-btn" disabled><span class="gen-spin"></span>Generating…</button>`;
  // simulated call — real integration proxies this through a backend that holds the KIE API key
  setTimeout(()=>{
    const text = buildReferenceCardText(data);
    onGenerate(text);
  }, 1200);
}

function renderGenSection(cat, idx){
  const it = cat.items[idx];
  renderGenBlock(document.getElementById('genSection'), it, it.referenceCard, (text)=>{
    it.referenceCard = text;
    renderGenSection(cat, idx);
  });
}

  previewEl.onclick = null;
  previewBarEl.textContent = isEdit ? 'Edit character — ' + existing.name : 'Add asset — Band / Characters';
  previewEl.innerHTML = `
    <div class="char-form">
      <h3>${isEdit ? 'Edit character' : 'New character'}</h3>
      <p class="sub">${isEdit ? 'Update the saved character details.' : 'Add a band member as a digital actor for this project.'}</p>

      <label class="photo-drop${existing && existing.photo ? ' has-photo' : ''}" id="photoDrop" for="photoInput" style="${existing && existing.photo ? `background-image:url(${existing.photo})` : ''}">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3.5"></circle></svg>
        <span>Add photo</span>
        <div class="photo-remove" id="photoRemove"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
      </label>
      <input type="file" id="photoInput" accept="image/*,.heic,.heif,.tiff,.tif,.bmp,.svg,.avif,.webp" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;">

      <div class="cf-field">
        <label>Name</label>
        <input type="text" id="cfName" placeholder="e.g. James Hetfield" value="${existing ? existing.name : ''}">
      </div>
      <div class="cf-field">
        <label>Role</label>
        <input type="text" id="cfRole" placeholder="e.g. Vocals, Lead guitar, Bass" value="${existing && existing.role ? existing.role : ''}">
      </div>
      <div class="cf-field">
        <label>Description</label>
        <textarea id="cfNotes" placeholder="Appearance, wardrobe, anything worth remembering">${existing && existing.description ? existing.description : ''}</textarea>
      </div>
      <div class="cf-field">
        <label>Additional angles</label>
        <div class="angles-row" id="anglesRow"></div>
        <input type="file" id="angleInput" accept="image/*,.heic,.heif,.tiff,.tif,.bmp,.svg,.avif,.webp" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;">
      </div>

      <div class="gen-section" id="genSectionForm"></div>

      <div class="cf-actions">
        <button class="cf-btn" id="cfCancel">Cancel</button>
        <button class="cf-btn primary" id="cfSave" ${existing && existing.name ? '' : 'disabled'}>${isEdit ? 'Save changes' : 'Add member'}</button>
      </div>
    </div>
  `;

  const anglePhotos = (existing && existing.angles) ? existing.angles.slice() : [];
  const anglesRow = document.getElementById('anglesRow');
  const angleInput = document.getElementById('angleInput');
  const roleInput = document.getElementById('cfRole');
  const notesInput = document.getElementById('cfNotes');
  let formRefText = existing ? existing.referenceCard || null : null;

  function refreshFormGen(){
    const data = {
      name: nameInput.value.trim(),
      role: roleInput.value.trim(),
      description: notesInput.value.trim(),
      photo: photoDataUrl,
      angles: anglePhotos,
    };
    renderGenBlock(document.getElementById('genSectionForm'), data, formRefText, (text)=>{
      formRefText = text;
      refreshFormGen();
    });
  }

  function renderAngles(){
    anglesRow.innerHTML = anglePhotos.map((src,idx)=>`
      <div class="angle-tile" style="background-image:url(${src})" data-idx="${idx}">
        <div class="angle-tile-del" title="Remove"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
      </div>
    `).join('') + `
      <label class="angle-tile-add" for="angleInput" title="Add angle"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></label>
    `;
    anglesRow.querySelectorAll('.angle-tile-del').forEach(btn=>{
      btn.onclick = (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const idx = parseInt(e.target.closest('.angle-tile').dataset.idx, 10);
        anglePhotos.splice(idx,1);
        renderAngles();
        refreshFormGen();
      };
    });
  }
  angleInput.onchange = async ()=>{
    const file = angleInput.files[0];
    if(!file) return;
    try{
      const dataUrl = await loadImageAsDataURL(file);
      anglePhotos.push(dataUrl);
      renderAngles();
      refreshFormGen();
    } catch(err){}
    angleInput.value='';
  };
  renderAngles();

  const photoDrop = document.getElementById('photoDrop');
  const photoInput = document.getElementById('photoInput');
  const photoRemove = document.getElementById('photoRemove');
  const nameInput = document.getElementById('cfName');
  const saveBtn = document.getElementById('cfSave');
  let photoDataUrl = existing ? existing.photo || null : null;
  if(photoDataUrl) applyNaturalAspect(photoDrop, photoDataUrl);

  photoInput.onchange = async ()=>{
    const file = photoInput.files[0];
    if(!file) return;
    try{
      photoDataUrl = await loadImageAsDataURL(file);
      photoDrop.classList.add('has-photo');
      photoDrop.style.backgroundImage = `url(${photoDataUrl})`;
      applyNaturalAspect(photoDrop, photoDataUrl);
      refreshFormGen();
    } catch(err){}
  };
  photoRemove.onclick = (e)=>{
    e.preventDefault();
    e.stopPropagation();
    photoDataUrl = null;
    photoDrop.classList.remove('has-photo');
    photoDrop.style.backgroundImage='';
    photoDrop.style.aspectRatio='';
    photoInput.value='';
    refreshFormGen();
  };

  function refreshSaveState(){
    saveBtn.disabled = nameInput.value.trim().length===0;
  }
  nameInput.addEventListener('input', ()=>{ refreshSaveState(); refreshFormGen(); });
  roleInput.addEventListener('input', refreshFormGen);
  notesInput.addEventListener('input', refreshFormGen);
  refreshFormGen();

  document.getElementById('cfCancel').onclick = ()=>{
    if(isEdit) showCharacterCard(cat, editIdx);
    else showCharacterGallery(cat);
  };
  saveBtn.onclick = ()=>{
    if(nameInput.value.trim().length===0) return;
    const data = {
      name: nameInput.value.trim(),
      icon: 'ti-user',
      live: !!photoDataUrl,
      photo: photoDataUrl,
      role: roleInput.value.trim(),
      description: notesInput.value.trim(),
      angles: anglePhotos.slice(),
      referenceCard: formRefText,
    };
    if(isEdit){
      cat.items[editIdx] = data;
      renderAssets();
      showCharacterCard(cat, editIdx);
    } else {
      cat.items.push(data);
      renderAssets();
      showCharacterGallery(cat);
    }
  };
}

// ---------- timeline / audio track ----------
function renderTimeline(){
  const musicCat = state.categories.find(c=>c.key==='music');
  const track = musicCat.items[0];
  if(!track){
    waveformWrap.innerHTML = `<div class="no-track">No music track added. Add one from the Music library on the left.</div>`;
    return;
  }
  waveformWrap.innerHTML = `
    <div class="waveform">
      <div class="track-name"><i class="ti ti-music"></i> ${track.name}</div>
      <canvas class="wave-canvas" id="wave"></canvas>
    </div>`;
  requestAnimationFrame(drawWave);
}

function drawWave(){
  const canvas = document.getElementById('wave');
  if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const bars = Math.floor(w/3);
  ctx.fillStyle = '#3f6b4f';
  let seed = 42;
  function rnd(){ seed = (seed*9301+49297)%233280; return seed/233280; }
  for(let i=0;i<bars;i++){
    const amp = (Math.sin(i*0.12)*0.3+0.5) * (0.4+rnd()*0.6);
    const bh = Math.max(2, amp*h);
    ctx.fillRect(i*3, (h-bh)/2, 2, bh);
  }
}

// ---------- init ----------
renderAssets();
renderTimelineScenes();
showTimelineFocusPreview();
renderTimeline();
window.addEventListener('resize', drawWave);
</script>
