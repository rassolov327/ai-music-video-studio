<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Music Video Studio — Prototype</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<style>
  :root{
    --bg-app:#15171b;
    --bg-panel:#1b1e24;
    --bg-panel-2:#20232a;
    --bg-elevated:#262a32;
    --line:#2b2f38;
    --line-soft:#22252c;
    --text-1:#e7e7e4;
    --text-2:#9498a0;
    --text-3:#5e626c;
    --accent:#e0983c;
    --accent-dim:#3a2f1e;
    --accent-text:#f2b968;
    --ok:#5fae7a;
    --warn:#e0b23c;
    --danger:#d9695f;
    --font-ui:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html, body{margin:0;height:100%;width:100%;overflow:hidden;font-family:var(--font-ui);}
  body{zoom:1.15;}
  #app{
    background:var(--bg-app);
    color:var(--text-1);
    overflow:hidden;
    font-size:13px;
    display:flex;
    flex-direction:column;
    height:100%;
    width:100%;
  }
  /* ---- Top bar ---- */
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:0 14px;height:44px;flex:0 0 auto;
    background:var(--bg-panel);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:500;color:var(--text-1);}
  .brand i{color:var(--accent);font-size:18px;}
  .menu{display:flex;gap:14px;color:var(--text-2);font-size:12.5px;}
  .menu span:hover{color:var(--text-1);cursor:default;}
  .proj-title{margin-left:auto;margin-right:auto;color:var(--text-2);font-size:12.5px;}
  .proj-title b{color:var(--text-1);font-weight:500;}
  .topbar-actions{display:flex;gap:6px;}
  .tbtn{
    display:flex;align-items:center;gap:6px;
    background:transparent;border:1px solid var(--line);color:var(--text-2);
    padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font-ui);
    cursor:pointer;
  }
  .tbtn:hover{border-color:#3a3e48;color:var(--text-1);background:var(--bg-elevated);}
  .tbtn.primary{background:var(--accent-dim);border-color:#5a4526;color:var(--accent-text);}
  .tbtn.primary:hover{background:#4a381f;}

  /* ---- Body layout ---- */
  .body-row{flex:1 1 auto;display:flex;min-height:0;}

  /* ---- Left assets panel ---- */
  .assets{
    width:220px;flex:0 0 auto;background:var(--bg-panel);
    border-right:1px solid var(--line);overflow-y:auto;padding:8px 0;
  }
  .cat{user-select:none;}
  .cat-head{
    display:flex;align-items:center;gap:6px;padding:6px 6px 6px 12px;cursor:pointer;color:var(--text-1);
  }
  .cat-head:hover{background:var(--bg-panel-2);}
  .cat-head:hover .cat-add{opacity:1;}
  .cat-head .chev{font-size:13px;color:var(--text-3);transition:transform .12s;flex:0 0 auto;}
  .cat-head.collapsed .chev{transform:rotate(-90deg);}
  .cat-head i.folder{font-size:15px;color:var(--text-2);flex:0 0 auto;}
  .cat-name{flex:1 1 auto;}
  .cat-count{color:var(--text-3);font-size:11px;font-family:var(--font-mono);margin-right:2px;}
  .cat-add{
    opacity:.5;flex:0 0 auto;width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
  }
  .cat-head:hover .cat-add{opacity:1;}
  .cat-add:hover{background:var(--bg-elevated);color:var(--accent-text);opacity:1;}
  .cat-add i{font-size:14px;}
  .cat-items{padding-left:8px;}
  .cat-items.hidden{display:none;}
  .item{
    display:flex;align-items:center;gap:7px;padding:5px 8px 5px 26px;color:var(--text-2);
    cursor:pointer;border-left:2px solid transparent;font-size:12.5px;position:relative;
  }
  .item:hover{background:var(--bg-panel-2);color:var(--text-1);}
  .item:hover .item-del{opacity:1;}
  .item.selected{color:var(--text-1);background:var(--bg-panel-2);border-left-color:var(--accent);}
  .item i.itype{font-size:14px;color:var(--text-3);flex:0 0 auto;}
  .item-avatar{
    width:18px;height:18px;border-radius:50%;flex:0 0 auto;
    background:var(--bg-elevated);background-size:cover;background-position:center;
  }
  .item-avatar-wrap{position:relative;flex:0 0 auto;display:inline-flex;}
  .item-status-dot{
    position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;
    border:1.5px solid var(--bg-panel);
  }
  .item-status-dot.status-green{background:var(--ok);}
  .item-status-dot.status-yellow{background:var(--warn);}
  .item-status-dot.status-red{background:var(--danger);}
  .item-name{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:0 0 auto;}
  .item-del{
    opacity:.4;flex:0 0 auto;width:18px;height:18px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);
  }
  .item:hover .item-del{opacity:1;}
  .item-del:hover{background:var(--bg-elevated);color:var(--danger);}
  .item-del i{font-size:13px;}
  .empty-cat{padding:5px 12px 8px 26px;color:var(--text-3);font-size:11.5px;font-style:italic;}

  /* ---- Center column ---- */
  .center{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;}
  .preview-bar{
    display:flex;align-items:center;gap:10px;padding:6px 12px;
    border-bottom:1px solid var(--line);color:var(--text-2);font-size:12px;flex:0 0 auto;
  }
  .pb-left{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;}
  .preview-bar #homeBtn{padding:4px 9px;flex:0 0 auto;}
  .preview-bar #previewBar{font-weight:500;color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .transport-btn{
    width:26px;height:26px;border-radius:6px;border:1px solid var(--line);background:var(--bg-elevated);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);cursor:pointer;
  }
  .transport-btn:hover{color:var(--text-1);border-color:#3a3e48;}
  .transport-btn.active{background:var(--accent-dim);border-color:#5a4526;color:var(--accent-text);}
  .preview-transport{
    display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;
    border-bottom:1px solid var(--line);flex:0 0 auto;
  }
  .preview-tc{font-family:var(--font-mono);font-size:11px;color:var(--text-2);margin-left:6px;}
  .preview{
    flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center, #23262d 0%, #16181c 78%);
    position:relative;min-height:0;overflow-y:auto;padding:24px;
  }
  .preview.align-tl{align-items:flex-start;justify-content:flex-start;}
  .empty-preview{
    display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-3);
  }
  .empty-preview i{font-size:34px;color:#4a4d54;}
  .empty-preview .t1{font-size:13px;color:var(--text-2);}
  .empty-preview .t2{font-size:12px;color:var(--text-3);}

  /* ---- Character gallery (tile grid) ---- */
  .char-gallery{width:100%;max-width:760px;}
  .char-grid{
    display:grid;grid-template-columns:repeat(auto-fill, 108px);gap:16px;
  }
  .char-tile{
    width:108px;cursor:pointer;position:relative;
  }
  .char-tile-photo{
    width:108px;height:108px;border-radius:8px;border:1px solid var(--line);
    background:var(--bg-panel-2);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  }
  .char-tile-photo i{font-size:32px;color:var(--text-3);}
  .char-tile:hover .char-tile-photo{border-color:#3a3e48;}
  .char-tile-name{
    margin-top:6px;font-size:12px;color:var(--text-2);text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .char-tile-role{
    font-size:10.5px;color:var(--text-3);text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .char-tile-del{
    position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:5px;
    background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;
    opacity:.55;
  }
  .char-tile-del:hover{background:rgba(217,105,95,.85);opacity:1;}
  .char-tile:hover .char-tile-del{opacity:1;}
  .char-tile-del i{font-size:13px;}
  .char-tile-status{
    position:absolute;top:5px;left:5px;width:10px;height:10px;border-radius:50%;
    border:1.5px solid rgba(0,0,0,.4);
  }
  .char-tile-status.status-green{background:var(--ok);}
  .char-tile-status.status-yellow{background:var(--warn);}
  .char-tile-status.status-red{background:var(--danger);}
  .char-tile-add .char-tile-photo{
    border-style:dashed;background:transparent;
  }
  .char-tile-add:hover .char-tile-photo{border-color:var(--accent);}
  .char-tile-add:hover .char-tile-photo i{color:var(--accent-text);}
  .char-tile-add .char-tile-name{color:var(--text-3);}

  /* ---- Character card ---- */
  .char-card{
    width:100%;max-width:640px;background:var(--bg-panel);border:1px solid var(--line);
    border-radius:10px;overflow:hidden;align-self:flex-start;display:flex;flex-direction:row;
    max-height:calc(100vh - 220px);
  }
  .char-card-photo{
    flex:0 0 220px;width:220px;background:var(--bg-panel-2);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);align-self:stretch;
  }
  .char-card-photo svg{width:40px;height:40px;}
  .char-card-body{padding:16px 18px;flex:1 1 auto;min-width:0;overflow-y:auto;}
  .char-card-name{font-size:16px;font-weight:500;color:var(--text-1);margin:0 0 3px;}
  .char-card-role{
    display:inline-block;font-size:11px;color:var(--accent-text);background:var(--accent-dim);
    padding:3px 8px;border-radius:5px;margin-bottom:12px;
  }
  .char-card-desc{font-size:12.5px;color:var(--text-2);line-height:1.6;margin:0 0 14px;white-space:pre-wrap;}
  .char-card-section-title{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;}
  .char-card-angles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .char-card-angle{
    width:44px;height:44px;border-radius:6px;border:1px solid var(--line);
    background-size:cover;background-position:center;background-color:var(--bg-panel-2);
  }
  .char-card-actions{display:flex;justify-content:space-between;gap:8px;}

  /* ---- AI reference generation ---- */
  .gen-section{border-top:1px solid var(--line);margin-top:14px;padding-top:14px;}
  .gen-btn{
    width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
    padding:9px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;border:1px solid #5a4526;
    background:var(--accent-dim);color:var(--accent-text);font-family:var(--font-ui);
  }
  .gen-btn:hover{background:#4a381f;}
  .gen-btn:disabled{opacity:.6;cursor:default;}
  .gen-cost{
    font-family:var(--font-mono);font-size:10.5px;color:var(--accent-text);opacity:.85;
    background:rgba(0,0,0,.18);padding:2px 6px;border-radius:4px;
  }
  .gen-hint{font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.5;}
  .scene-char-row{
    display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--line-soft);
  }
  .scene-char-row:last-child{border-bottom:none;}
  .scene-char-name{font-size:12px;color:var(--text-1);flex:0 0 auto;max-width:40%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .scene-char-look{
    flex:1 1 auto;min-width:0;background:var(--bg-elevated);border:1px solid var(--line);color:var(--text-2);
    border-radius:5px;padding:4px 6px;font-size:11px;
  }
  .scene-char-remove{
    flex:0 0 auto;color:var(--text-3);cursor:pointer;opacity:.6;padding:2px;
  }
  .scene-char-remove:hover{opacity:1;color:var(--danger);}
  .scene-char-add-row{display:flex;gap:6px;margin-top:8px;}
  .scene-char-add-row select{
    flex:1 1 auto;min-width:0;background:var(--bg-elevated);border:1px solid var(--line);color:var(--text-1);
    border-radius:5px;padding:6px 8px;font-size:12px;
  }
  .scene-char-add-row .cf-btn{flex:0 0 auto;}
  .shot-preview-thumb{
    position:relative;width:100%;aspect-ratio:16/9;border-radius:6px;border:1px solid var(--line);
    overflow:hidden;margin-bottom:10px;background:var(--bg-panel-2);
  }
  .shot-preview-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .gen-spin{
    width:12px;height:12px;border-radius:50%;border:2px solid rgba(242,185,104,.35);
    border-top-color:var(--accent-text);animation:gen-spin-rot .7s linear infinite;flex:0 0 auto;
  }
  @keyframes gen-spin-rot{to{transform:rotate(360deg);}}
  .ref-status{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ok);margin-bottom:10px;
  }
  .ref-status .dot2{width:6px;height:6px;border-radius:50%;background:var(--ok);}
  .ref-card-box{
    background:var(--bg-elevated);border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-family:var(--font-mono);font-size:11px;line-height:1.6;
    white-space:pre-wrap;color:var(--text-2);max-height:220px;overflow-y:auto;margin-bottom:10px;
  }
  .ref-actions{display:flex;gap:8px;}
  .ref-actions .cf-btn{flex:1 1 auto;}

  /* ---- Character creation form ---- */
  .char-form{
    width:100%;max-width:420px;max-height:100%;overflow-y:auto;background:var(--bg-panel);border:1px solid var(--line);
    border-radius:10px;padding:18px;align-self:center;
  }
  .char-form h3{margin:0 0 3px;font-size:15px;font-weight:500;color:var(--text-1);}
  .char-form .sub{margin:0 0 16px;font-size:12px;color:var(--text-3);}
  .photo-drop{
    width:100%;aspect-ratio:4/3;max-height:200px;border-radius:8px;border:1px dashed var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    color:var(--text-3);cursor:pointer;margin-bottom:16px;background:var(--bg-panel-2);
    background-size:cover;background-position:center;position:relative;overflow:hidden;
  }
  .photo-drop:hover{border-color:#3a3e48;color:var(--text-2);}
  .photo-drop svg{flex:0 0 auto;}
  .photo-drop span{font-size:12px;}
  .photo-drop.has-photo span, .photo-drop.has-photo svg{display:none;}
  .photo-drop .photo-remove{
    position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:5px;
    background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;color:#fff;
  }
  .photo-drop.has-photo .photo-remove{display:flex;}
  .cf-field{margin-bottom:12px;}
  .cf-field label{display:block;font-size:11px;color:var(--text-3);margin-bottom:4px;}
  .cf-field input[type=text], .cf-field select, .cf-field textarea{
    width:100%;background:var(--bg-elevated);border:1px solid var(--line);color:var(--text-1);
    border-radius:5px;padding:7px 9px;font-size:12.5px;font-family:var(--font-ui);
  }
  .cf-field input:focus, .cf-field select:focus, .cf-field textarea:focus{outline:none;border-color:var(--accent);}
  .cf-field textarea{resize:vertical;min-height:52px;line-height:1.5;}
  .angles-row{display:flex;flex-wrap:wrap;gap:8px;}
  .angle-tile{
    width:52px;height:52px;border-radius:6px;border:1px solid var(--line);
    background:var(--bg-panel-2);background-size:cover;background-position:center;
    position:relative;flex:0 0 auto;
  }
  .angle-tile-del{
    position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:4px;
    background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;color:#fff;
    opacity:.6;
  }
  .angle-tile-del:hover{background:rgba(217,105,95,.85);opacity:1;}
  .angle-tile-add{
    width:52px;height:52px;border-radius:6px;border:1px dashed var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--text-3);cursor:pointer;flex:0 0 auto;
  }
  .angle-tile-add:hover{border-color:var(--accent);color:var(--accent-text);}

  .req-checklist{
    background:var(--bg-panel-2);border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--text-3);line-height:1.65;
  }
  .req-checklist .req-title{color:var(--text-2);font-weight:500;margin-bottom:4px;font-size:11px;}
  .angle-progress{font-size:10.5px;color:var(--text-3);margin-bottom:8px;font-family:var(--font-mono);}
  .angle-progress b{color:var(--text-2);}
  .angle-slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .angle-slot{
    position:relative;aspect-ratio:1;border-radius:8px;border:1px dashed var(--line);
    background:var(--bg-panel-2);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;cursor:pointer;overflow:hidden;color:var(--text-3);text-align:center;padding:4px;
  }
  .angle-slot:hover{border-color:var(--accent);color:var(--accent-text);}
  .angle-slot.optional{border-style:dotted;}
  .angle-slot.filled{border-style:solid;border-color:var(--line);color:var(--text-3);}
  .angle-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .angle-slot .slot-plus{position:relative;z-index:1;}
  .angle-slot .slot-label{position:relative;z-index:1;font-size:9.5px;line-height:1.3;}
  .angle-slot.filled .slot-label{
    position:absolute;left:0;right:0;bottom:0;z-index:1;background:rgba(0,0,0,.6);color:#fff;
    padding:3px 2px;
  }
  .angle-slot .slot-remove{
    position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:4px;z-index:2;
    background:rgba(0,0,0,.55);color:#fff;display:none;align-items:center;justify-content:center;opacity:.75;
  }
  .angle-slot.filled .slot-remove{display:flex;}
  .angle-slot .slot-remove:hover{background:rgba(217,105,95,.85);opacity:1;}
  .turnaround-sheet-preview{width:100%;border-radius:6px;border:1px solid var(--line);margin-bottom:10px;display:block;}
  .cf-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .form-tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:14px;}
  .form-tab{
    padding:7px 12px;font-size:12px;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;
  }
  .form-tab.active{color:var(--text-1);border-bottom-color:var(--accent);}
  .form-tab:hover{color:var(--text-1);}
  .ai-result-img{width:100%;border-radius:8px;border:1px solid var(--line);margin-top:12px;display:block;}
  .ai-result-actions{display:flex;gap:8px;margin-top:8px;}
  .ai-result-actions .cf-btn{flex:1 1 auto;}
  .cf-btn{
    padding:7px 14px;border-radius:6px;font-size:12.5px;cursor:pointer;border:1px solid var(--line);
    background:transparent;color:var(--text-2);
  }
  .cf-btn:hover{color:var(--text-1);border-color:#3a3e48;}
  .cf-btn.primary{background:var(--accent-dim);border-color:#5a4526;color:var(--accent-text);}
  .cf-btn.primary:hover{background:#4a381f;}
  .cf-btn.primary:disabled{opacity:.45;cursor:default;background:var(--accent-dim);}

  /* ---- Bottom audio track ---- */
  .timeline-area{border-top:1px solid var(--line);background:var(--bg-panel);flex:0 0 auto;}
  .timeline-scenes{overflow-x:auto;border-bottom:1px solid var(--line-soft);position:relative;}
  .timeline-ruler{
    position:relative;height:20px;min-width:100%;
    background:var(--bg-panel-2);border-bottom:1px solid var(--line-soft);cursor:pointer;user-select:none;
  }
  .ruler-tick{
    position:absolute;top:4px;bottom:4px;width:1px;background:rgba(255,255,255,0.16);
  }
  .ruler-tick.labeled{
    top:0;bottom:auto;height:100%;padding-left:4px;background:none;border-left:1px solid rgba(255,255,255,0.16);
    font-family:var(--font-mono);font-size:9.5px;color:var(--text-3);line-height:20px;white-space:nowrap;
  }
  .timeline-track{display:flex;align-items:flex-start;gap:10px;position:relative;min-height:92px;padding:10px 12px;}

  .scene-rename-input{
    background:var(--bg-app);border:1px solid var(--accent);color:var(--text-1);

  .insert-btn{

  .block-del{
    position:absolute;top:3px;right:3px;width:15px;height:15px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);opacity:.6;

  .block-rename:hover{background:rgba(0,0,0,.55);color:#fff;opacity:1;}
  .playhead-hit{position:absolute;top:0;width:16px;margin-left:-8px;z-index:5;pointer-events:none;}

  .wave-canvas{flex:1 1 auto;height:36px;}

  .vol-control span{font-family:var(--font-mono);font-size:10px;color:var(--text-3);width:32px;}
  .audio-clip-wrap{position:relative;height:36px;flex:0 0 auto;background:var(--bg-elevated);border-radius:4px;overflow:hidden;}

  /* ---- Right inspector ---- */
  .inspector{
    width:230px;flex:0 0 auto;background:var(--bg-panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;
  }

  .insp-tab.active{color:var(--text-1);border-bottom-color:var(--accent);}
  .insp-empty{padding:16px 14px;color:var(--text-3);font-size:12px;line-height:1.6;}
  #inspBody{flex:1 1 auto;overflow-y:auto;min-height:0;}

  .mixer-panel{
    flex:0 0 auto;border-top:1px solid var(--line);padding:12px 10px 14px;
    display:flex;flex-direction:column;align-items:center;gap:8px;height:200px;
  }
  .mixer-empty{color:var(--text-3);font-size:11px;text-align:center;line-height:1.5;margin:auto;}
  .mixer-track-name{
    font-size:10.5px;color:var(--text-2);text-align:center;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .mixer-fader-row{display:flex;align-items:flex-end;gap:8px;flex:1 1 auto;padding:4px 0;}
  .vu-meter{
    position:relative;width:8px;height:100%;background:var(--bg-elevated);border-radius:3px;
    overflow:hidden;display:flex;align-items:flex-end;
  }
  .vu-meter-fill{
    width:100%;height:0%;background:linear-gradient(0deg,#5fae7a 0%,#5fae7a 70%,#e0b23c 85%,#d9695f 100%);
    transition:height .05s linear;
  }
  .fader-track{
    position:relative;width:6px;height:100%;background:var(--bg-elevated);border-radius:3px;cursor:pointer;
  }
  .fader-fill{
    position:absolute;left:0;bottom:0;width:100%;height:0%;background:var(--accent-dim);border-radius:3px;
    pointer-events:none;
  }
  .fader-handle{
    position:absolute;left:50%;bottom:0%;width:20px;height:11px;background:var(--bg-elevated);
    border:1px solid var(--line);border-radius:3px;transform:translate(-50%,50%);cursor:ns-resize;
  }
  .fader-handle::before{
    content:'';position:absolute;left:3px;right:3px;top:50%;height:1px;background:var(--text-3);
  }
  .mixer-vol-label{font-family:var(--font-mono);font-size:11px;color:var(--text-2);}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#33373f;border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
</style>

<body>
<div id="app">

  <div class="topbar">
    <div class="brand"><i class="ti ti-movie"></i>AI Music Video Studio</div>
    <div class="menu"><span>File</span><span>Edit</span><span>Project</span><span>Tools</span><span>Help</span></div>
    <div class="proj-title">New project — <b>Untitled</b></div>
    <div class="topbar-actions">
      <button class="tbtn primary"><i class="ti ti-player-play"></i>Render <span class="gen-cost" style="margin-left:2px;">~$0.30/shot</span></button>
    </div>
  </div>

  <div class="body-row">

    <div class="assets" id="assets"></div>

    <div class="center">
      <div class="preview-bar">
        <div class="pb-left">
          <button class="tbtn" id="homeBtn" title="Back to main screen"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"></path><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"></path></svg>Home</button>
          <span id="previewBar">Preview</span>
        </div>
      </div>
      <div class="preview" id="preview"></div>
      <div class="preview-transport">
        <button class="transport-btn" id="playBtn2" title="Play"><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5,3 19,12 5,21"></polygon></svg></button>
        <button class="transport-btn" id="pauseBtn2" title="Pause"><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><rect x="5" y="3" width="5" height="18"></rect><rect x="14" y="3" width="5" height="18"></rect></svg></button>
        <button class="transport-btn" id="stopBtn2" title="Stop"><svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><rect x="4" y="4" width="16" height="16"></rect></svg></button>
        <span class="preview-tc" id="tcCurrent2">0:00:00</span>
      </div>

      <div class="timeline-area">
        <div class="timeline-mode-row">
          <div class="mode-tab active" id="modeAssemblyBtn" data-mode="assembly">Assembly</div>
          <div class="mode-tab" id="modeEditBtn" data-mode="edit">Edit</div>
        </div>
        <div class="timeline-scenes" id="timelineScenes"></div>

          <span id="tcCurrent">0:00</span>
          <span id="tcTotal">0:00</span>

      </div>

    <div class="inspector">
      <div class="insp-tabs">
        <div class="insp-tab active">Inspector</div>
      </div>
      <div id="inspBody">
        <div class="insp-empty">No shot selected.<br>Create a scene and a shot to see its parameters here.</div>
      </div>
      <div class="mixer-panel" id="mixerPanel">
        <div class="mixer-empty">No audio track<br>on the timeline</div>
      </div>
    </div>

  </div>
</div>

<script>
// ---------- state ----------
const state = {
  categories: [
    {key:'music', name:'Music', icon:'ti-music', addType:'music', collapsed:true, items:[]},
    {key:'band', name:'Band / Characters', icon:'ti-users', addType:'character', collapsed:true, items:[]},
    {key:'looks', name:'Looks', icon:'ti-shirt', addType:'look', collapsed:true, items:[]},
    {key:'locations', name:'Locations', icon:'ti-map-pin', addType:'location', collapsed:true, items:[]},
    {key:'scenes', name:'Scenes', icon:'ti-movie', addType:'scene', collapsed:true, items:[]},
  ],
  scenes: [],
  timelineAudio: null // { trackId, trimIn, trimOut, volume } — which Music asset (and window/volume) is on the timeline
};

let sceneSeq = 1, shotSeq = 1, paletteSeq = 0, charSeq = 1, locSeq = 1, trackSeq = 1, lookSeq = 1;
let focus = { sceneId: null, shotId: null };
let timelineMode = 'assembly'; // 'assembly' (spaced, insert-between) | 'edit' (flush clips, drag-to-reorder within scene)
let playheadX = 0;
const PX_PER_SEC = 40; // scale of the ruler/track: 1 real second of playback = 40px
const PROJECT_FPS = 24; // standard film rate — used for the frame-accurate timecode readout
// CSS `zoom` scales rendered/visual pixels (getBoundingClientRect, clientX) but NOT layout
// pixels (offsetLeft/offsetWidth/scrollWidth) — read it once so pointer math can convert
// between the two consistently instead of drifting off the cursor.
const ZOOM = parseFloat(getComputedStyle(document.body).zoom) || 1;
const SONG_DURATION_SEC = 332; // Enter Sandman runtime (5:32) — placeholder until real audio analysis is wired up
const TIMELINE_END_SEC = SONG_DURATION_SEC * 1.1; // full scrubbable/playable range: song length + 10%

const TIMELINE_COLORS = [
  { dot:'#5f8ad4', bg:'rgba(60,95,150,0.22)',  thumb:'linear-gradient(160deg,#3a5f8a,#1c2f45)', hexA:'#3a5f8a', hexB:'#1c2f45' },
  { dot:'#7ec463', bg:'rgba(80,140,60,0.22)',  thumb:'linear-gradient(160deg,#5f8a3a,#2f451c)', hexA:'#5f8a3a', hexB:'#2f451c' },
  { dot:'#d873a3', bg:'rgba(150,60,110,0.22)', thumb:'linear-gradient(160deg,#8a3a5f,#451c2f)', hexA:'#8a3a5f', hexB:'#451c2f' },
  { dot:'#e0a54f', bg:'rgba(150,110,60,0.22)', thumb:'linear-gradient(160deg,#8a6a3a,#45351c)', hexA:'#8a6a3a', hexB:'#45351c' },
  { dot:'#4fc4b0', bg:'rgba(58,140,125,0.22)', thumb:'linear-gradient(160deg,#3a8a7a,#1c453d)', hexA:'#3a8a7a', hexB:'#1c453d' },
  { dot:'#a878e0', bg:'rgba(105,60,150,0.22)', thumb:'linear-gradient(160deg,#6a3a8a,#351c45)', hexA:'#6a3a8a', hexB:'#351c45' },
];

const assetsEl = document.getElementById('assets');
const previewEl = document.getElementById('preview');
const previewBarEl = document.getElementById('previewBar');
// waveformWrap is created fresh inside #timelineScenes on every render (see renderTimelineScenes) —
// look it up via document.getElementById('waveformWrap') at point of use instead of caching it here.
const timelineScenesEl = document.getElementById('timelineScenes');

function trashSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>`;
}
function pencilSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"></path></svg>`;
}
function plusSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
}
function noteSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>`;
}
function shirtSvg(size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4l4 3-2.5 3-1.5-1v10a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V9l-1.5 1L4 7l4-3 2 2h4l2-2z"></path></svg>`;
}
function lookStatus(it){
  if(!it.name || !it.characterId || !it.description) return 'red';
  if(!it.previewImage || !it.approved) return 'yellow';
  return 'green';
}

// Angle set for the character turnaround sheet — mirrors how reference-based consistency
// actually works in models like Kling Elements / GPT-Image-1 / Nano Banana: a handful of
// well-chosen angles + one expression beats a pile of near-duplicate photos.
const CHAR_ANGLE_SLOTS = [
  { key:'front',            label:'Front',        hint:'Neutral face, straight at camera', required:true },
  { key:'threeQuarterLeft', label:'3/4 Left',      hint:'Head turned ~45° left',            required:true },
  { key:'threeQuarterRight',label:'3/4 Right',     hint:'Head turned ~45° right',           required:true },
  { key:'profile',          label:'Profile',       hint:'Full side view',                   required:true },
  { key:'fullBody',         label:'Full body',     hint:'Neutral pose, base outfit',         required:true },
  { key:'smile',            label:'Expression',    hint:'Smiling / genuine expression',      required:true },
  { key:'back',             label:'Back',          hint:'Back of head (optional)',           required:false },
  { key:'closeup',          label:'Close-up',      hint:'Distinctive detail (optional)',     required:false },
];
function emptyAngleSlots(){
  const obj = {};
  CHAR_ANGLE_SLOTS.forEach(s=> obj[s.key]=null);
  return obj;
}
function filledCoreAngleCount(slots){
  if(!slots) return 0;
  return CHAR_ANGLE_SLOTS.filter(s=>s.required && slots[s.key]).length;
}
function coreAngleCountTotal(){
  return CHAR_ANGLE_SLOTS.filter(s=>s.required).length;
}

function formatTimecode(seconds){
  const m = Math.floor(seconds/60);
  const s = Math.floor(seconds%60);
  return m + ':' + String(s).padStart(2,'0');
}
function formatTimecodeFrames(seconds){
  const m = Math.floor(seconds/60);
  const s = Math.floor(seconds%60);
  const f = Math.floor((seconds - Math.floor(seconds)) * PROJECT_FPS);
  return m + ':' + String(s).padStart(2,'0') + ':' + String(f).padStart(2,'0');
}
function sceneColor(scene){ return TIMELINE_COLORS[scene.colorIdx % TIMELINE_COLORS.length]; }

// ---------- timeline: scenes ----------
function addScene(){
  const id = 's' + (sceneSeq++);
  state.scenes.push({ id, name: 'Scene ' + (state.scenes.length + 1), colorIdx: paletteSeq++, shots: [] });
  focus = { sceneId: id, shotId: null };
  renderTimelineScenes();
  movePlayheadToFocus();
  positionPlayhead();
  wireTimelineDrag();
  renderAssets();
  showSceneGallery(id);
}
function deleteScene(id){
  state.scenes = state.scenes.filter(s=>s.id!==id);
  if(focus.sceneId===id) focus = { sceneId:null, shotId:null };
  renderTimelineScenes();
  renderAssets();
  refreshMainPreview();
}
function startRenameScene(id, labelEl){
  const scene = state.scenes.find(s=>s.id===id);
  if(!scene) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = scene.name;
  input.className = 'scene-rename-input';
  labelEl.replaceWith(input);
  input.focus();
  input.select();
  function commit(){
    scene.name = input.value.trim() || scene.name;
    renderTimelineScenes();
    renderAssets();
    if(focus.sceneId===id) refreshMainPreview();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.blur(); });
}
function addShotAt(sceneId, index){
  const scene = state.scenes.find(s=>s.id===sceneId);
  if(!scene) return;
  const shot = { id: 'sh' + (shotSeq++), name: 'Shot ' + (scene.shots.length + 1), duration: 5 };
  scene.shots.splice(index, 0, shot);
  focus = { sceneId, shotId: shot.id };
  renderTimelineScenes();
  movePlayheadToFocus();
  positionPlayhead();
  wireTimelineDrag();
  refreshMainPreview();
}
function deleteShot(sceneId, shotId){
  const scene = state.scenes.find(s=>s.id===sceneId);
  if(!scene) return;
  scene.shots = scene.shots.filter(sh=>sh.id!==shotId);
  if(focus.shotId===shotId) focus = { sceneId, shotId:null };
  renderTimelineScenes();
  refreshMainPreview();
}
function startRenameShot(sceneId, shotId, labelEl){
  const scene = state.scenes.find(s=>s.id===sceneId);
  const shot = scene && scene.shots.find(sh=>sh.id===shotId);
  if(!shot) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = shot.name;
  input.className = 'scene-rename-input';
  input.style.width = '64px';
  labelEl.replaceWith(input);
  input.focus();
  input.select();
  function commit(){
    shot.name = input.value.trim() || shot.name;
    renderTimelineScenes();
    if(focus.shotId===shotId) refreshMainPreview();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') input.blur(); });
}
function setFocus(sceneId, shotId){
  focus = { sceneId, shotId: shotId || null };
  pausePlayback();
  renderTimelineScenes();
  movePlayheadToFocus();
  positionPlayhead();
  wireTimelineDrag();
  refreshMainPreview();
}

function renderTimelineScenes(){
  if(!timelineScenesEl) return;
  const isEdit = timelineMode==='edit';

  if(isEdit){
    renderEditModeTrack();
  } else {
    renderAssemblyModeTrack();
  }

  renderRuler();
  positionPlayhead();
  wireTimelineDrag();
}

// Edit mode: one continuous flush strip, so clip widths line up exactly with the ruler.
// No plus buttons anywhere here — adding scenes/shots happens in Assembly mode.
function renderEditModeTrack(){
  let x = 0;
  let clipsHtml = '';
  let labelsHtml = '';
  state.scenes.forEach(scene=>{
    if(scene.shots.length===0) return; // nothing to place on a real timeline yet
    const col = sceneColor(scene);
    const sceneStartX = x;
    scene.shots.forEach(shot=>{
      const isFocused = focus.sceneId===scene.id && focus.shotId===shot.id;
      const wpx = Math.round(shot.duration * PX_PER_SEC);
      const thumbBg = shot.previewImage ? '' : `background:${col.thumb};`;
      clipsHtml += `
        <div class="shot-thumb edit-clip${isFocused?' focused':''}" data-anchor data-scene="${scene.id}" data-shot="${shot.id}"
             style="${thumbBg}border-bottom:3px solid ${col.dot};position:absolute;left:${x}px;top:0;width:${wpx}px;height:100%;">
          ${shot.previewImage ? `<img src="${shot.previewImage}">` : ''}
          <div class="shot-trim left" data-trim="${scene.id}|${shot.id}|left" title="Drag to trim"></div>
          <div class="shot-trim right" data-trim="${scene.id}|${shot.id}|right" title="Drag to trim"></div>
          <div class="block-rename" data-rename-btn-shot="${scene.id}|${shot.id}" title="Rename">${pencilSvg(9)}</div>
          <div class="block-del" data-del-shot="${scene.id}|${shot.id}" title="Delete shot">${trashSvg(9)}</div>
          <span class="st-name" data-rename-shot="${scene.id}|${shot.id}">${shot.name}</span>
          <span class="st-meta">${shot.duration}s</span>
        </div>`;
      x += wpx;
    });
    const sceneWidth = x - sceneStartX;
    labelsHtml += `
      <div class="scene-label-row edit-label" style="position:absolute;left:${sceneStartX}px;width:${sceneWidth}px;">
        <span class="scene-color-dot" style="background:${col.dot};"></span>
        <span class="scene-label-name" data-rename-scene="${scene.id}">${scene.name}</span>
        <span class="scene-label-actions">
          <span class="scene-label-btn" data-rename-btn-scene="${scene.id}" title="Rename">${pencilSvg(9)}</span>
          <span class="scene-label-btn" data-del-scene="${scene.id}" title="Delete scene">${trashSvg(9)}</span>
        </span>
      </div>`;
  });

  const totalWidth = Math.max(x, 1);
  const html = `
    <div class="timeline-ruler" id="timelineRuler"></div>
    <div class="edit-labels-row" style="position:relative;height:16px;width:${totalWidth}px;">${labelsHtml}</div>
    <div class="timeline-track edit-track" id="timelineTrack" style="position:relative;height:60px;width:${totalWidth}px;">${clipsHtml}</div>
    <div id="waveformWrap"></div>
  `;
  timelineScenesEl.innerHTML = html;
  wireCommonTimelineHandlers();
  if(x===0){
    timelineScenesEl.querySelector('.timeline-track').innerHTML =
      `<div class="insp-empty" style="padding:8px 4px;">No shots yet — switch to Assembly to add some.</div>`;
  } else {
    wireEditModeReorder();
  }
  renderTimeline();
}

function wireCommonTimelineHandlers(){
  timelineScenesEl.querySelectorAll('[data-del-scene]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); deleteScene(el.dataset.delScene); };
  });
  timelineScenesEl.querySelectorAll('[data-rename-btn-scene]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.dataset.renameBtnScene;
      const label = timelineScenesEl.querySelector(`[data-rename-scene="${id}"]`);
      if(label) startRenameScene(id, label);
    };
  });
  timelineScenesEl.querySelectorAll('[data-add-at]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [sid, idx] = el.dataset.addAt.split('|');
      addShotAt(sid, parseInt(idx,10));
    };
  });
  timelineScenesEl.querySelectorAll('[data-del-shot]').forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); const [sid,shid]=el.dataset.delShot.split('|'); deleteShot(sid,shid); };
  });
  timelineScenesEl.querySelectorAll('[data-rename-btn-shot]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [sid,shid] = el.dataset.renameBtnShot.split('|');
      const label = timelineScenesEl.querySelector(`[data-rename-shot="${sid}|${shid}"]`);
      if(label) startRenameShot(sid, shid, label);
    };
  });
  timelineScenesEl.querySelectorAll('.shot-thumb').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.closest('.block-del') || e.target.closest('.block-rename') || e.target.closest('.shot-trim')) return;
      if(el.dataset.wasDragged) { delete el.dataset.wasDragged; return; }
      setFocus(el.dataset.scene, el.dataset.shot);
    };
  });
  timelineScenesEl.querySelectorAll('[data-trim]').forEach(el=>{
    el.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      const [sid, shid, side] = el.dataset.trim.split('|');
      const scene = state.scenes.find(s=>s.id===sid);
      const shot = scene && scene.shots.find(sh=>sh.id===shid);
      if(!shot) return;
      const thumbEl = el.parentElement;
      const startX = e.clientX;
      const startDuration = shot.duration;
      el.setPointerCapture(e.pointerId);
      document.body.style.cursor = 'ew-resize';
      const MIN_SEC = 0.5;
      const onMove = (ev)=>{
        const deltaPx = (ev.clientX - startX) / ZOOM;
        const deltaSec = deltaPx / PX_PER_SEC;
        const raw = side==='right' ? startDuration + deltaSec : startDuration - deltaSec;
        const newDuration = Math.max(MIN_SEC, Math.round(raw*10)/10);
        const wpx = Math.round(newDuration * PX_PER_SEC);
        thumbEl.style.width = wpx + 'px';
        thumbEl.style.flexBasis = wpx + 'px';
        const meta = thumbEl.querySelector('.st-meta');
        if(meta) meta.textContent = newDuration.toFixed(1) + 's';
        thumbEl.dataset.pendingDuration = newDuration;
      };
      const onUp = ()=>{
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
        document.body.style.cursor = '';
        const pending = parseFloat(thumbEl.dataset.pendingDuration);
        if(!isNaN(pending)) shot.duration = pending;
        renderTimelineScenes();
        if(focus.sceneId===sid && focus.shotId===shid) renderInspectorPanel();
      };
      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
    });
  });
}

function wireEditModeReorder(){
  timelineScenesEl.querySelectorAll('.shot-thumb.edit-clip').forEach(el=>{
    el.addEventListener('pointerdown', (e)=>{
      if(e.target.closest('.shot-trim') || e.target.closest('.block-del') || e.target.closest('.block-rename')) return;
      const sceneId = el.dataset.scene;
      const shotId = el.dataset.shot;
      el.setPointerCapture(e.pointerId);
      let moved = false;
      let lastSwapX = e.clientX;
      const onMove = (ev)=>{
        if(Math.abs(ev.clientX - lastSwapX) < 4 && !moved) return;
        if(!moved){ moved = true; el.classList.add('dragging'); }
        const scene = state.scenes.find(s=>s.id===sceneId);
        if(!scene) return;
        const rect = el.getBoundingClientRect();
        const draggedCenter = rect.left + rect.width/2;
        const siblings = Array.from(timelineScenesEl.querySelectorAll(`.shot-thumb.edit-clip[data-scene="${sceneId}"]`));
        for(const sib of siblings){
          if(sib===el) continue;
          const sRect = sib.getBoundingClientRect();
          const sCenter = sRect.left + sRect.width/2;
          const overSib = ev.clientX > sRect.left && ev.clientX < sRect.right;
          if(overSib){
            const fromIdx = scene.shots.findIndex(sh=>sh.id===shotId);
            const toIdx = scene.shots.findIndex(sh=>sh.id===sib.dataset.shot);
            if(fromIdx>-1 && toIdx>-1 && fromIdx!==toIdx){
              const [moved_] = scene.shots.splice(fromIdx,1);
              scene.shots.splice(toIdx,0,moved_);
              lastSwapX = ev.clientX;
              renderTimelineScenes();
              const again = timelineScenesEl.querySelector(`.shot-thumb.edit-clip[data-shot="${shotId}"]`);
              if(again){ again.classList.add('dragging'); again.setPointerCapture(e.pointerId); }
            }
            break;
          }
        }
      };
      const onUp = ()=>{
        el.removeEventListener('pointermove', onMove);
        el.removeEventListener('pointerup', onUp);
        if(moved){
          const stillHere = timelineScenesEl.querySelector(`.shot-thumb.edit-clip[data-shot="${shotId}"]`);
          if(stillHere){ stillHere.classList.remove('dragging'); stillHere.dataset.wasDragged = '1'; }
        }
      };
      el.addEventListener('pointermove', onMove);
      el.addEventListener('pointerup', onUp);
    });
  });
}

function getTotalTimelinePx(){
  const track = document.getElementById('timelineTrack');
  const contentWidth = track ? track.scrollWidth : 0;
  return Math.max(contentWidth, Math.round(TIMELINE_END_SEC * PX_PER_SEC));
}
function getActualClipDurationSec(){
  let total = 0;
  state.scenes.forEach(s=> s.shots.forEach(sh=> total += sh.duration));
  return total;
}
function updateTimecodeReadout(){
  const cur = document.getElementById('tcCurrent');
  const tot = document.getElementById('tcTotal');
  const cur2 = document.getElementById('tcCurrent2');
  if(cur) cur.textContent = formatTimecode(playheadX / PX_PER_SEC);
  if(tot) tot.textContent = formatTimecode(getActualClipDurationSec());
  if(cur2) cur2.textContent = formatTimecodeFrames(playheadX / PX_PER_SEC);
}

function renderRuler(){
  const ruler = document.getElementById('timelineRuler');
  const track = document.getElementById('timelineTrack');
  if(!ruler || !track) return;
  const totalWidth = getTotalTimelinePx();
  ruler.style.width = totalWidth + 'px';
  track.style.minWidth = totalWidth + 'px';
  const totalSeconds = Math.ceil(totalWidth / PX_PER_SEC);
  const showLabels = timelineMode==='edit';
  let html = '';
  for(let s=0; s<=totalSeconds; s+=2){
    html += `<div class="ruler-tick${showLabels?' labeled':''}" style="left:${s*PX_PER_SEC}px;">${showLabels?formatTimecode(s):''}</div>`;
  }
  ruler.innerHTML = html;
}

function positionPlayhead(){
  const ruler = document.getElementById('timelineRuler');
  const track = document.getElementById('timelineTrack');
  if(!ruler || !track) return;
  const old = document.getElementById('timelinePlayhead');
  if(old) old.remove();
  playheadX = Math.max(0, Math.min(playheadX, getTotalTimelinePx()));
  const labelsRow = timelineScenesEl.querySelector('.edit-labels-row');
  const totalHeight = ruler.offsetHeight + (labelsRow ? labelsRow.offsetHeight : 0) + track.offsetHeight;
  const marker = document.createElement('div');
  marker.className = 'playhead-hit';
  marker.id = 'timelinePlayhead';
  marker.style.left = playheadX + 'px';
  marker.style.height = totalHeight + 'px';
  marker.innerHTML = `<div class="playhead-handle"></div><div class="playhead-line"></div><div class="playhead-flag"></div>`;
  timelineScenesEl.appendChild(marker);
  updateTimecodeReadout();
}

// returns the shot/empty-cell whose pixel range contains x, or the last one before x if x sits in a gap
function anchorAtX(x){
  const track = document.getElementById('timelineTrack');
  if(!track) return null;
  const anchors = Array.from(track.querySelectorAll('[data-anchor]')).sort((a,b)=>a.offsetLeft-b.offsetLeft);
  if(anchors.length===0) return null;
  let candidate = null;
  for(const el of anchors){
    if(x >= el.offsetLeft && x < el.offsetLeft + el.offsetWidth) return el;
    if(el.offsetLeft <= x) candidate = el;
  }
  return candidate || anchors[0];
}

// moves the playhead to sit exactly on the currently focused shot/scene (used after creating or clicking one)
function movePlayheadToFocus(){
  const track = document.getElementById('timelineTrack');
  if(!track || !focus.sceneId) return;
  const anchor = focus.shotId
    ? track.querySelector(`.shot-thumb[data-shot="${focus.shotId}"]`)
    : track.querySelector(`.empty-scene-cell[data-scene="${focus.sceneId}"]`);
  if(anchor) playheadX = anchor.offsetLeft + anchor.offsetWidth/2;
}

function syncFocusToPlayhead(){
  const anchor = anchorAtX(playheadX);
  focus = anchor ? { sceneId: anchor.dataset.scene, shotId: anchor.dataset.shot || null } : { sceneId:null, shotId:null };
  renderTimelineScenes();
  refreshMainPreview();
}

function wireTimelineDrag(){
  const ruler = document.getElementById('timelineRuler');
  const track = document.getElementById('timelineTrack');
  const marker = document.getElementById('timelinePlayhead');
  const handle = marker ? marker.querySelector('.playhead-handle') : null;
  if(!ruler || !track) return;

  // clientX/getBoundingClientRect are in VISUAL (post-zoom) pixels, while offsetLeft/
  // scrollWidth are in LAYOUT (pre-zoom) pixels under CSS `zoom` — divide by ZOOM so the
  // marker lands exactly under the cursor instead of drifting.
  function setPlayheadFromClientX(clientX){
    const rect = track.getBoundingClientRect();
    const logicalX = (clientX - rect.left) / ZOOM + track.scrollLeft;
    playheadX = Math.max(0, Math.min(logicalX, getTotalTimelinePx()));
  }

  ruler.onclick = (e)=>{
    pausePlayback();
    setPlayheadFromClientX(e.clientX);
    syncFocusToPlayhead();
  };

  if(handle){
    handle.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      pausePlayback();
      handle.setPointerCapture(e.pointerId);
      document.body.style.cursor = 'ew-resize';
      const onMove = (ev)=>{
        setPlayheadFromClientX(ev.clientX);
        marker.style.left = playheadX + 'px';
        updateTimecodeReadout();
      };
      const onUp = (ev)=>{
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
        document.body.style.cursor = '';
        setPlayheadFromClientX(ev.clientX);
        syncFocusToPlayhead();
      };
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
    });
  }
}

// ---------- transport: play / pause / stop (with real audio playback) ----------
let isPlaying = false;
let playRafId = null;
let playStartPerf = 0, playStartX = 0;
let audioEl = null;

function updateTransportButtons(){
  const playBtn2 = document.getElementById('playBtn2');
  const pauseBtn2 = document.getElementById('pauseBtn2');
  if(playBtn2) playBtn2.classList.toggle('active', isPlaying);
  if(pauseBtn2) pauseBtn2.classList.toggle('active', !isPlaying);
}

function getActiveTrack(){
  if(!state.timelineAudio) return null;
  const musicCat = state.categories.find(c=>c.key==='music');
  return musicCat.items.find(t=>t.id===state.timelineAudio.trackId) || null;
}

function startPlayback(){
  if(isPlaying) return;
  isPlaying = true;
  updateTransportButtons();
  const track = getActiveTrack();
  if(track && track.audioUrl){
    if(!audioEl){
      audioEl = new Audio();
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }
    if(audioEl.dataset.trackId !== track.id){
      audioEl.src = track.audioUrl;
      audioEl.dataset.trackId = track.id;
    }
    const ta = state.timelineAudio;
    audioEl.volume = Math.max(0, Math.min(1, ta.volume));

    // play() must be called synchronously inside the click/keydown handler — browsers
    // block audio started from an async callback instead of directly within the gesture.
    // Seeking doesn't have that restriction, so it's fine to defer until metadata is ready.
    const playPromise = audioEl.play();
    if(playPromise && playPromise.catch) playPromise.catch(err=> console.warn('Audio play() was blocked:', err));

    const doSeek = ()=>{
      try{
        const target = ta.trimIn + (playheadX / PX_PER_SEC);
        const safeOut = Math.max(ta.trimIn, (ta.trimOut || audioEl.duration || target) - 0.05);
        audioEl.currentTime = Math.min(target, safeOut);
      } catch(err){ console.warn('Audio seek failed:', err); }
    };
    if(audioEl.readyState >= 1){
      doSeek();
    } else {
      audioEl.addEventListener('loadedmetadata', doSeek, { once:true });
    }
  }
  playStartPerf = performance.now();
  playStartX = playheadX;
  runPlayLoop();
}

function runPlayLoop(){
  if(!isPlaying) return;
  const maxX = getTotalTimelinePx();
  const track = getActiveTrack();
  const ta = state.timelineAudio;

  if(track && audioEl && ta && !audioEl.paused){
    const relSec = audioEl.currentTime - ta.trimIn;
    playheadX = Math.max(0, Math.min(relSec * PX_PER_SEC, maxX));
    if(audioEl.currentTime >= ta.trimOut - 0.02){
      audioEl.pause();
    }
  } else {
    const elapsedSec = (performance.now() - playStartPerf) / 1000;
    playheadX = Math.min(playStartX + elapsedSec * PX_PER_SEC, maxX);
  }

  const marker = document.getElementById('timelinePlayhead');
  if(marker) marker.style.left = playheadX + 'px';
  updateTimecodeReadout();
  updateVuMeter();

  const anchor = anchorAtX(playheadX);
  const newSceneId = anchor ? anchor.dataset.scene : null;
  const newShotId = anchor ? (anchor.dataset.shot || null) : null;
  if(newSceneId!==focus.sceneId || newShotId!==focus.shotId){
    focus = { sceneId:newSceneId, shotId:newShotId };
    renderTimelineScenes();
    refreshMainPreview();
  }

  if(playheadX >= maxX){ pausePlayback(); return; }
  playRafId = requestAnimationFrame(runPlayLoop);
}

function pausePlayback(){
  if(playRafId){ cancelAnimationFrame(playRafId); playRafId = null; }
  if(audioEl) audioEl.pause();
  isPlaying = false;
  updateTransportButtons();
  updateVuMeter(true);
}
function stopPlayback(){
  pausePlayback();
  playheadX = 0;
  if(audioEl && state.timelineAudio) audioEl.currentTime = state.timelineAudio.trimIn;
  syncFocusToPlayhead();
}

// ---------- mixer: vertical volume fader + live VU meter ----------
function renderMixerPanel(){
  const panel = document.getElementById('mixerPanel');
  if(!panel) return;
  const track = getActiveTrack();
  if(!track || !state.timelineAudio){
    panel.innerHTML = `<div class="mixer-empty">No audio track<br>on the timeline</div>`;
    return;
  }
  const vol = Math.round(state.timelineAudio.volume * 100);
  panel.innerHTML = `
    <div class="mixer-track-name" title="${track.name}">${track.name}</div>
    <div class="mixer-fader-row">
      <div class="vu-meter"><div class="vu-meter-fill" id="vuMeterFill" style="height:0%;"></div></div>
      <div class="fader-track" id="faderTrack">
        <div class="fader-fill" id="faderFill" style="height:${vol}%;"></div>
        <div class="fader-handle" id="faderHandle" style="bottom:${vol}%;"></div>
      </div>
    </div>
    <div class="mixer-vol-label" id="mixerVolLabel">${vol}</div>
  `;
  wireFader();
}

function applyVolume(vol){
  if(!state.timelineAudio) return;
  vol = Math.max(0, Math.min(100, Math.round(vol)));
  state.timelineAudio.volume = vol / 100;
  if(audioEl) audioEl.volume = vol / 100;
  const fill = document.getElementById('faderFill');
  const handle = document.getElementById('faderHandle');
  const label = document.getElementById('mixerVolLabel');
  if(fill) fill.style.height = vol + '%';
  if(handle) handle.style.bottom = vol + '%';
  if(label) label.textContent = vol;
}

function wireFader(){
  const trackEl = document.getElementById('faderTrack');
  if(!trackEl) return;
  function setFromClientY(clientY){
    const rect = trackEl.getBoundingClientRect();
    let ratio = 1 - (clientY - rect.top) / rect.height; // ratio-based: immune to CSS zoom, top=100%
    applyVolume(ratio * 100);
  }
  trackEl.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    trackEl.setPointerCapture(e.pointerId);
    setFromClientY(e.clientY);
    const onMove = (ev)=> setFromClientY(ev.clientY);
    const onUp = ()=>{
      trackEl.removeEventListener('pointermove', onMove);
      trackEl.removeEventListener('pointerup', onUp);
    };
    trackEl.addEventListener('pointermove', onMove);
    trackEl.addEventListener('pointerup', onUp);
  });
}

function updateVuMeter(reset){
  const fill = document.getElementById('vuMeterFill');
  if(!fill) return;
  if(reset || !isPlaying){
    fill.style.height = '0%';
    return;
  }
  const track = getActiveTrack();
  const ta = state.timelineAudio;
  if(!track || !track.peaks || !ta || !track.fullDuration){
    fill.style.height = '0%';
    return;
  }
  const curSec = ta.trimIn + (playheadX / PX_PER_SEC);
  const idx = Math.max(0, Math.min(track.peaks.length-1, Math.floor((curSec/track.fullDuration) * track.peaks.length)));
  const amp = track.peaks[idx] || 0;
  const level = Math.min(1, amp * 1.5) * (ta.volume || 0);
  fill.style.height = Math.round(level*100) + '%';
}

function showSceneGallery(sceneId){
  pausePlayback();
  const scene = state.scenes.find(s=>s.id===sceneId);
  if(!scene) return;
  previewEl.classList.add('align-tl');
  previewEl.onclick = null;
  previewBarEl.textContent = scene.name;
  focus = { sceneId, shotId: null };
  renderTimelineScenes();
  movePlayheadToFocus();
  positionPlayhead();
  wireTimelineDrag();

  function render(){
    const tiles = scene.shots.map(shot=>`
      <div class="char-tile" data-shot="${shot.id}">
        <div class="char-tile-photo">
          ${shot.previewImage ? `<img src="${shot.previewImage}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">` : '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="11" r="2"></circle><path d="M21 16l-5-4-4 3-3-2-6 5"></path></svg>'}
          <div class="char-tile-del" data-del-shot="${shot.id}" title="Remove">${trashSvg(13)}</div>
        </div>
        <div class="char-tile-name" data-rename-shot="${shot.id}">${shot.name}</div>
        <div class="char-tile-role">${shot.duration}s</div>
      </div>
    `).join('');

    previewEl.innerHTML = `
      <div class="char-gallery">
        <div class="char-grid">
          ${tiles}
          <div class="char-tile char-tile-add" id="addShotTileScene">
            <div class="char-tile-photo">${plusSvg(26)}</div>
            <div class="char-tile-name">Add shot</div>
          </div>
        </div>
      </div>`;

    document.getElementById('addShotTileScene').onclick = ()=>{
      const shot = { id: 'sh' + (shotSeq++), name: 'Shot ' + (scene.shots.length + 1), duration: 5 };
      scene.shots.push(shot);
      focus = { sceneId, shotId: shot.id };
      renderTimelineScenes();
      renderAssets();
      render();
    };
    previewEl.querySelectorAll('[data-del-shot]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        scene.shots = scene.shots.filter(sh=>sh.id!==el.dataset.delShot);
        if(focus.shotId===el.dataset.delShot) focus = { sceneId, shotId:null };
        renderTimelineScenes();
        render();
      };
    });
    previewEl.querySelectorAll('[data-rename-shot]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const shotId = el.dataset.renameShot;
        const shot = scene.shots.find(sh=>sh.id===shotId);
        if(!shot) return;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = shot.name;
        input.className = 'scene-rename-input';
        el.replaceWith(input);
        input.focus();
        input.select();
        function commit(){
          shot.name = input.value.trim() || shot.name;
          renderTimelineScenes();
          render();
        }
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (ev)=>{ if(ev.key==='Enter') input.blur(); });
      };
    });
    previewEl.querySelectorAll('.char-tile:not(.char-tile-add)').forEach(tile=>{
      tile.onclick = (e)=>{
        if(e.target.closest('.char-tile-del') || e.target.closest('[data-rename-shot]')) return;
        focus = { sceneId, shotId: tile.dataset.shot };
        renderTimelineScenes();
        renderInspectorPanel();
      };
    });
  }
  render();
  renderInspectorPanel();
}

function refreshMainPreview(){
  previewEl.classList.remove('align-tl');
  previewEl.onclick = null;

  if(!focus.sceneId){
    previewBarEl.textContent = 'Preview';
    previewEl.innerHTML = `
      <div class="empty-preview">
        <i class="ti ti-clapperboard"></i>
        <div class="t1">${state.scenes.length===0 ? 'No scenes yet' : 'No shot selected'}</div>
        <div class="t2">${state.scenes.length===0 ? 'Add your first scene from the timeline below.' : 'Click a shot on the timeline to preview it.'}</div>
      </div>`;
    renderInspectorPanel();
    return;
  }

  const scene = state.scenes.find(s=>s.id===focus.sceneId);
  if(!scene){ focus = { sceneId:null, shotId:null }; return refreshMainPreview(); }
  const shot = focus.shotId ? scene.shots.find(sh=>sh.id===focus.shotId) : null;
  const col = sceneColor(scene);

  previewBarEl.textContent = shot ? `${scene.name} — ${shot.name}` : scene.name;

  if(shot && shot.previewImage){
    previewEl.innerHTML = `
      <div class="timeline-frame" style="border-color:transparent;">
        <img src="${shot.previewImage}">
        <span class="plabel" style="position:relative;z-index:1;color:#fff;background:rgba(0,0,0,.5);padding:3px 9px;border-radius:5px;align-self:flex-end;margin:10px;">${shot.name}</span>
      </div>`;

    previewEl.innerHTML = `
      <div class="timeline-frame" style="background:${col.thumb};border-color:transparent;">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="11" r="2"></circle><path d="M21 16l-5-4-4 3-3-2-6 5"></path></svg>

      </div>`;
  }
  renderInspectorPanel();
}

const SHOT_SIZES = ['Detail Shot','Extreme Close-Up','Close-Up','Medium Close-Up','Medium Shot','Medium Wide Shot','Wide Shot','Extreme Wide Shot'];
const CAMERA_MOVES = ['Static','Push In','Pull Out','Steadicam','Crane'];

function renderSceneSettingsPanel(body, scene){
  const locCat = state.categories.find(c=>c.key==='locations');
  const locations = locCat ? locCat.items : [];
  const bandCat = state.categories.find(c=>c.key==='band');
  const characters = bandCat ? bandCat.items : [];
  const looksCat = state.categories.find(c=>c.key==='looks');
  const allLooks = looksCat ? looksCat.items : [];
  const TIME_OF_DAY = ['Morning','Day','Evening','Night'];

  if(!scene.characters) scene.characters = [];
  const availableChars = characters.filter(c=> !scene.characters.some(e=>e.characterId===c.id));

  const charRowsHtml = scene.characters.length===0
    ? `<div class="gen-hint" style="margin-top:0;">No characters in this scene yet.</div>`
    : scene.characters.map((entry, idx)=>{
        const c = characters.find(x=>x.id===entry.characterId);
        const charLooks = allLooks.filter(l=>l.characterId===entry.characterId && l.approved);
        return `
          <div class="scene-char-row" data-idx="${idx}">
            <span class="scene-char-name">${c ? c.name : '(deleted)'}</span>
            <select class="scene-char-look" data-idx="${idx}">
              <option value="">${charLooks.length===0 ? 'No approved looks' : 'No look'}</option>
              ${charLooks.map(l=>`<option value="${l.id}" ${entry.lookId===l.id?'selected':''}>${l.name}</option>`).join('')}
            </select>
            <span class="scene-char-remove" data-idx="${idx}" title="Remove from scene">${trashSvg(12)}</span>
          </div>`;
      }).join('');

  const addRowHtml = characters.length===0
    ? `<div class="gen-hint" style="margin-top:6px;">No characters created yet — add one in Band / Characters.</div>`
    : availableChars.length===0
      ? ''
      : `<div class="scene-char-add-row">
          <select id="addCharacterSelect">
            ${availableChars.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
          <button class="cf-btn" id="addCharacterBtn">Add character</button>
        </div>`;

  body.innerHTML = `
    <div style="padding:14px;">
      <div class="cat-count" style="font-size:11px;margin-bottom:10px;">Scene settings</div>
      <div class="cf-field"><label>Name</label><input type="text" id="sceneNameInput" value="${scene.name}"></div>
      <div class="cf-field"><label>Location</label>
        <select id="sceneLocInput">
          <option value="">${locations.length===0 ? 'No locations yet' : 'Select location'}</option>
          ${locations.map(l=>`<option ${scene.location===l.name?'selected':''}>${l.name}</option>`).join('')}
        </select>
      </div>
      <div class="cf-field"><label>Time of day</label>
        <select id="sceneTimeInput">
          <option value="">Select time of day</option>
          ${TIME_OF_DAY.map(t=>`<option ${scene.timeOfDay===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="cf-field"><label>Description</label>
        <textarea id="sceneDescInput" style="min-height:80px;" placeholder="What happens in this scene...">${scene.description||''}</textarea>
      </div>

      <div class="field-group">
        <div class="field-group-title">Characters in this scene</div>
        <div id="sceneCharList">${charRowsHtml}</div>
        ${addRowHtml}
        <div class="gen-hint" style="margin-top:8px;">Every shot in this scene automatically uses these characters and looks — set once here so nothing drifts shot to shot.</div>
      </div>
    </div>`;

  document.getElementById('sceneNameInput').addEventListener('input', (e)=>{
    scene.name = e.target.value;
    renderTimelineScenes();
    renderAssets();
    previewBarEl.textContent = scene.name;
  });
  document.getElementById('sceneLocInput').addEventListener('change', (e)=>{ scene.location = e.target.value; });
  document.getElementById('sceneTimeInput').addEventListener('change', (e)=>{ scene.timeOfDay = e.target.value; });
  document.getElementById('sceneDescInput').addEventListener('input', (e)=>{ scene.description = e.target.value; });

  const addBtn = document.getElementById('addCharacterBtn');
  if(addBtn){
    addBtn.onclick = ()=>{
      const sel = document.getElementById('addCharacterSelect');
      if(!sel || !sel.value) return;
      scene.characters.push({ characterId: sel.value, lookId: null });
      renderSceneSettingsPanel(body, scene);
    };
  }
  body.querySelectorAll('.scene-char-look').forEach(sel=>{
    sel.addEventListener('change', (e)=>{
      const idx = parseInt(e.target.dataset.idx, 10);
      scene.characters[idx].lookId = e.target.value || null;
    });
  });
  body.querySelectorAll('.scene-char-remove').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const idx = parseInt(e.target.closest('[data-idx]').dataset.idx, 10);
      scene.characters.splice(idx,1);
      renderSceneSettingsPanel(body, scene);
    });
  });
}

function renderInspectorPanel(){
  const body = document.getElementById('inspBody');
  if(!body) return;

  if(!focus.sceneId){
    body.innerHTML = `<div class="insp-empty">No shot selected.<br>Create a scene and a shot to see its parameters here.</div>`;
    return;
  }
  const scene = state.scenes.find(s=>s.id===focus.sceneId);
  if(!scene){ body.innerHTML = `<div class="insp-empty">No shot selected.</div>`; return; }

  if(!focus.shotId){
    renderSceneSettingsPanel(body, scene);
    return;
  }
  const shot = scene.shots.find(sh=>sh.id===focus.shotId);
  if(!shot){ body.innerHTML = `<div class="insp-empty">No shot selected.</div>`; return; }
  if(!scene.characters) scene.characters = [];

  const bandCat = state.categories.find(c=>c.key==='band');
  const characters = bandCat ? bandCat.items : [];
  const looksCat = state.categories.find(c=>c.key==='looks');
  const allLooks = looksCat ? looksCat.items : [];

  const sceneCharHtml = scene.characters.length===0
    ? `<div class="gen-hint" style="margin-top:0;">No characters in this scene yet.</div>`
    : scene.characters.map(entry=>{
        const c = characters.find(x=>x.id===entry.characterId);
        const look = entry.lookId ? allLooks.find(l=>l.id===entry.lookId) : null;
        return `<div class="char-row checked" style="cursor:default;">${c ? c.name : '(deleted)'}${look ? ` <span style="color:var(--text-3);">— ${look.name}</span>` : ''}</div>`;
      }).join('');

  body.innerHTML = `
    <div style="padding:14px;">
      <div class="cat-count" style="font-size:11px;margin-bottom:10px;">${scene.name}</div>
      <div class="cf-field"><label>Name</label><input type="text" id="shotNameInput" value="${shot.name}"></div>
      <div class="cf-field"><label>Duration (sec)</label><input type="number" id="shotDurInput" min="0.5" step="0.1" value="${shot.duration}"></div>

      <div class="field-group">
        <div class="field-group-title">Characters <span style="font-weight:400;color:var(--text-3);">— inherited from scene</span></div>
        <div class="char-list">${sceneCharHtml}</div>
        <button class="cf-btn" id="jumpToSceneBtn" style="margin-top:8px;width:100%;">Edit in Scene settings</button>
      </div>

      <div class="cf-field"><label>Shot size</label>
        <select id="shotSizeInput">
          <option value="">Select shot size</option>
          ${SHOT_SIZES.map(s=>`<option ${shot.shotSize===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="cf-field"><label>Camera movement</label>
        <select id="shotMoveInput">
          <option value="">Select movement</option>
          ${CAMERA_MOVES.map(s=>`<option ${shot.cameraMove===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="cf-field"><label>Lighting</label>
        <input type="text" id="shotLightInput" placeholder="e.g. low key, back light, blue rim" value="${shot.lighting||''}">
      </div>
      <div class="cf-field"><label>Description <span style="color:var(--text-3);font-weight:400;">— prompt for AI generation</span></label>
        <textarea id="shotDescInput" style="min-height:90px;" placeholder="Describe exactly what should happen in this shot...">${shot.description||''}</textarea>
      </div>

      <div class="gen-section" id="shotGenSection"></div>
    </div>`;

  renderShotGenSection(scene, shot);

  document.getElementById('jumpToSceneBtn').onclick = ()=> setFocus(scene.id, null);
  document.getElementById('shotNameInput').addEventListener('input', (e)=>{
    shot.name = e.target.value;
    renderTimelineScenes();
    previewBarEl.textContent = scene.name + ' — ' + shot.name;
  });
  document.getElementById('shotDurInput').addEventListener('input', (e)=>{
    shot.duration = parseFloat(e.target.value) || shot.duration;
    renderTimelineScenes();
  });
  document.getElementById('shotSizeInput').addEventListener('change', (e)=>{ shot.shotSize = e.target.value; });
  document.getElementById('shotMoveInput').addEventListener('change', (e)=>{ shot.cameraMove = e.target.value; });
  document.getElementById('shotLightInput').addEventListener('input', (e)=>{ shot.lighting = e.target.value; });
  document.getElementById('shotDescInput').addEventListener('input', (e)=>{ shot.description = e.target.value; });
}

function renderShotGenSection(scene, shot){
  const section = document.getElementById('shotGenSection');
  if(!section) return;

  if(shot.previewImage){
    section.innerHTML = `
      <div class="shot-preview-thumb"><img src="${shot.previewImage}"></div>
      <button class="cf-btn" id="shotRegenBtn" style="width:100%;">Regenerate preview <span class="gen-cost">${SHOT_GEN_COST_LABEL}</span></button>`;
    document.getElementById('shotRegenBtn').onclick = ()=> runShotGeneration(scene, shot);
  } else {
    section.innerHTML = `
      <button class="gen-btn" id="shotGenBtn">Generate preview <span class="gen-cost">${SHOT_GEN_COST_LABEL}</span></button>
      <div class="gen-hint">Generates a preview frame (via ${SHOT_GEN_MODEL_LABEL}) from this shot's parameters. Shown here, on the timeline thumbnail, and in the main preview.</div>`;
    document.getElementById('shotGenBtn').onclick = ()=> runShotGeneration(scene, shot);
  }
}

function runShotGeneration(scene, shot){
  const section = document.getElementById('shotGenSection');
  if(!section) return;
  section.innerHTML = `<button class="gen-btn" disabled><span class="gen-spin"></span>Generating…</button>`;
  const prompt = buildShotPrompt(shot, scene);
  tryLoadImage(buildPollinationsUrl(prompt, 640, 360))
    .catch(()=> generateShotPreviewImage(shot, scene))
    .then((result)=>{
      shot.previewImage = result;
      renderTimelineScenes();
      if(focus.sceneId===scene.id && focus.shotId===shot.id) refreshMainPreview();
      else renderShotGenSection(scene, shot);
    });
}


function renderAssets(){
  assetsEl.innerHTML='';
  state.categories.forEach(cat=>{
    const isScenes = cat.key==='scenes';
    const displayItems = isScenes ? state.scenes : cat.items;

    const catEl = document.createElement('div');
    catEl.className='cat';

    const head = document.createElement('div');
    head.className='cat-head' + (cat.collapsed ? ' collapsed' : '');
    head.innerHTML = `
      <svg class="chev" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      <i class="ti ${cat.icon} folder"></i>
      <span class="cat-name">${cat.name}</span>
      <span class="cat-count">${displayItems.length || ''}</span>
      <span class="cat-add" title="Open editor"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"></path></svg></span>
    `;

    const itemsEl = document.createElement('div');
    itemsEl.className='cat-items' + (cat.collapsed ? ' hidden' : '');

    if(displayItems.length===0){
      const empty = document.createElement('div');
      empty.className='empty-cat';
      empty.textContent = 'No assets yet';
      itemsEl.appendChild(empty);
    } else if(isScenes){
      state.scenes.forEach((scene)=>{
        const row = document.createElement('div');
        row.className='item';
        const col = sceneColor(scene);
        row.innerHTML = `<span class="scene-color-dot" style="background:${col.dot};margin-right:1px;"></span><span class="item-name">${scene.name}</span>
          <span class="item-del" title="Remove"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></span>`;
        row.onclick = (e)=>{
          if(e.target.closest('.item-del')) return;
          document.querySelectorAll('.item.selected').forEach(el=>el.classList.remove('selected'));
          row.classList.add('selected');
          showSceneGallery(scene.id);
        };
        row.querySelector('.item-del').onclick = (e)=>{
          e.stopPropagation();
          deleteScene(scene.id);
        };
        itemsEl.appendChild(row);
      });
    } else {
      cat.items.forEach((it,idx)=>{
        const row = document.createElement('div');
        row.className='item';
        const isChar = cat.addType==='character';
        const isLoc = cat.addType==='location';
        const isMusic = cat.addType==='music';
        const isLook = cat.addType==='look';
        const statusDot = isChar ? `<span class="item-status-dot status-${characterStatus(it)}"></span>`
          : isLoc ? `<span class="item-status-dot status-${locationStatus(it)}"></span>`
          : isLook ? `<span class="item-status-dot status-${lookStatus(it)}"></span>` : '';
        const iconHtml = it.photo
          ? `<span class="item-avatar-wrap"><span class="item-avatar" style="background-image:url(${it.photo})"></span>${statusDot}</span>`
          : isMusic
            ? `<span class="item-avatar-wrap" style="color:var(--text-3);">${noteSvg(14)}</span>`
            : isLook
              ? `<span class="item-avatar-wrap" style="color:var(--text-3);position:relative;">${it.previewImage ? `<span class="item-avatar" style="background-image:url(${it.previewImage})"></span>` : shirtSvg(14)}${statusDot}</span>`
              : `<span class="item-avatar-wrap"><i class="ti ${it.icon} itype"></i>${statusDot}</span>`;
        row.innerHTML = `${iconHtml}<span class="item-name">${it.name}</span>
          <span class="item-del" title="Remove"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></span>`;
        if(isMusic && it.id){
          row.draggable = true;
          row.title = 'Drag onto the timeline';
          row.addEventListener('dragstart', (e)=>{
            e.dataTransfer.setData('text/plain', it.id);
            e.dataTransfer.effectAllowed = 'copy';
          });
        }
        row.onclick = (e)=>{
          if(e.target.closest('.item-del')) return;
          document.querySelectorAll('.item.selected').forEach(el=>el.classList.remove('selected'));
          row.classList.add('selected');
          if(cat.addType==='character'){
            showCharacterCard(cat, idx);
          } else if(cat.addType==='location'){
            showLocationCard(cat, idx);
          } else if(cat.addType==='look'){
            showLookForm(cat, idx);
          }
        };
        row.querySelector('.item-del').onclick = (e)=>{
          e.stopPropagation();
          if(isMusic && state.timelineAudio && state.timelineAudio.trackId===it.id){
            state.timelineAudio = null;
          }
          if(isMusic && it.audioUrl) URL.revokeObjectURL(it.audioUrl);
          cat.items.splice(idx,1);
          renderAssets();

// ---------- helpers: image loading (with TIFF decode support) ----------
function loadImageAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const isTiff = /\.tiff?$/i.test(file.name) || file.type==='image/tiff' || file.type==='image/tif';
    if(isTiff && window.UTIF){
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const buffer = reader.result;
          const ifds = UTIF.decode(buffer);
          UTIF.decodeImage(buffer, ifds[0]);
          const rgba = UTIF.toRGBA8(ifds[0]);
          const canvas = document.createElement('canvas');
          canvas.width = ifds[0].width;
          canvas.height = ifds[0].height;
          const ctx = canvas.getContext('2d');
          const imgData = ctx.createImageData(ifds[0].width, ifds[0].height);
          imgData.data.set(rgba);
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL('image/png'));
        } catch(err){
          // fall back to a plain data URL if decoding fails
          const fr2 = new FileReader();
          fr2.onload = ()=> resolve(fr2.result);
          fr2.onerror = reject;
          fr2.readAsDataURL(file);
        }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    }
  });
}
function applyNaturalAspect(el, dataUrl){
  if(!dataUrl) return;
  const img = new Image();
  img.onload = ()=>{
    if(img.naturalWidth && img.naturalHeight){
      el.style.aspectRatio = img.naturalWidth + ' / ' + img.naturalHeight;
    }
  };
  img.src = dataUrl;
}
