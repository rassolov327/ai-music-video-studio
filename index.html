// ---------- free rough-preview generation via Pollinations.ai (no key required) ----------
function buildPollinationsUrl(prompt, w, h){
  const seed = Math.floor(Math.random()*1000000);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&nologo=true&seed=${seed}`;
}
function tryLoadImage(url, timeoutMs){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    let done = false;
    const timer = setTimeout(()=>{ if(!done){ done=true; reject(new Error('timeout')); } }, timeoutMs || 20000);
    img.onload = ()=>{ if(!done){ done=true; clearTimeout(timer); resolve(url); } };
    img.onerror = ()=>{ if(!done){ done=true; clearTimeout(timer); reject(new Error('load failed')); } };
    img.referrerPolicy = 'no-referrer';
    img.src = url;
  });
}
function buildShotPrompt(shot, scene){
  const parts = [];

  // characters (and their assigned looks) now live on the scene, inherited by every shot
  if(scene && scene.characters && scene.characters.length){
    const bandCat = state.categories.find(c=>c.key==='band');
    const chars = bandCat ? bandCat.items : [];
    const looksCat = state.categories.find(c=>c.key==='looks');
    const looks = looksCat ? looksCat.items : [];
    scene.characters.forEach(entry=>{
      const c = chars.find(x=>x.id===entry.characterId);
      if(!c) return;
      let piece = c.name;
      if(c.description) piece += ' (' + c.description + ')';
      if(entry.lookId){
        const look = looks.find(l=>l.id===entry.lookId);
        if(look && look.description) piece += ', wearing ' + look.description;
      }
      parts.push('featuring ' + piece);
    });
  }

  if(shot.description) parts.push(shot.description);
  if(shot.shotSize) parts.push(shot.shotSize.toLowerCase());
  if(shot.cameraMove && shot.cameraMove!=='Static') parts.push(shot.cameraMove.toLowerCase()+' camera movement');
  if(shot.lighting) parts.push(shot.lighting);

  // location — pull its saved description too, not just the name
  if(scene && scene.location){
    const locCat = state.categories.find(c=>c.key==='locations');
    const loc = locCat ? locCat.items.find(l=>l.name===scene.location) : null;
    parts.push('in ' + scene.location + (loc && loc.description ? ', ' + loc.description : ''));
  }
  if(scene && scene.timeOfDay) parts.push('during the ' + scene.timeOfDay.toLowerCase());

  parts.push('cinematic still frame, film grain, music video');
  return parts.join(', ');
}

function generateShotPreviewImage(shot, scene){
  const col = sceneColor(scene);
  const canvas = document.createElement('canvas');
  canvas.width = 640; canvas.height = 360;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 640, 360);
  grad.addColorStop(0, col.hexA);
  grad.addColorStop(1, col.hexB);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 640, 360);
  // a few soft abstract shapes so every generation looks a little different
  let seed = shot.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0) + shot.duration*97;
  function rnd(){ seed = (seed*9301+49297)%233280; return seed/233280; }
  for(let i=0;i<5;i++){
    ctx.beginPath();
    const r = 40 + rnd()*120;
    ctx.fillStyle = `rgba(255,255,255,${0.03+rnd()*0.05})`;
    ctx.arc(rnd()*640, rnd()*360, r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fillRect(0, 300, 640, 60);
  ctx.fillStyle = '#fff';
  ctx.font = '600 20px Inter, sans-serif';
  ctx.fillText(shot.name, 16, 335);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '12px "JetBrains Mono", monospace';
  ctx.fillText(scene.name + ' · ' + shot.duration + 's', 16, 352);
  return canvas.toDataURL('image/png');
}

function buildReferenceCardText(it, kind){
  kind = kind || 'character';
  const lines = [];
  lines.push(kind==='location' ? '# LOCATION REFERENCE CARD' : '# CHARACTER REFERENCE CARD');
  lines.push('name: ' + it.name);
  if(it.role) lines.push('role: ' + it.role);
  lines.push('primary_photo: ' + (it.photo ? 'attached (1)' : 'none'));
  if(kind==='character' && it.angleSlots){
    const filled = CHAR_ANGLE_SLOTS.filter(s=>it.angleSlots[s.key]).map(s=>s.label);
    lines.push('angle_refs: ' + filled.length + ' attached (' + (filled.join(', ') || 'none') + ')');
  } else {
    lines.push('angle_refs: ' + ((it.angles && it.angles.length) || 0) + ' attached');
  }
  if(it.description) lines.push('description: ' + it.description);
  lines.push('');
  lines.push('consistency_rule:');
  if(kind==='location'){
    lines.push('  Always render this location matching the geometry, layout,');
    lines.push('  furniture and lighting style captured above. Only deviate when');
    lines.push('  a shot explicitly overrides a detail (e.g. "after the fight",');
    lines.push('  "smoke-filled", "red lighting") — those overrides apply to');
    lines.push('  that shot only and reset on the next one unless carried forward.');
  } else {
    lines.push('  Always render this character matching the face, hair, build');
    lines.push('  and wardrobe captured above. Only deviate when a shot');
    lines.push('  explicitly overrides a detail (e.g. "wet", "no jacket",');
    lines.push('  "bloodied lip") — those overrides apply to that shot only');
    lines.push('  and reset on the next one unless carried forward.');
  }
  return lines.join('\n');
}

// Composites the filled angle slots into one "turnaround sheet" image — entirely local
// (canvas), no network call. This is the same asset a real KIE call would later send as
// the reference image(s) to Kling Elements / GPT-Image-1 / Nano Banana etc.
function buildTurnaroundSheet(data){
  const slots = data.angleSlots;
  if(!slots) return Promise.resolve(null);
  const present = CHAR_ANGLE_SLOTS.filter(s=>slots[s.key]);
  if(present.length===0) return Promise.resolve(null);

  const cellW = 220, cellH = 220, labelH = 24, pad = 10;
  const cols = Math.min(4, present.length);
  const rows = Math.ceil(present.length/cols);
  const canvas = document.createElement('canvas');
  canvas.width = cols*cellW + (cols+1)*pad;
  canvas.height = rows*(cellH+labelH) + (rows+1)*pad;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#15171b';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const loads = present.map((slotDef, i)=> new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const col = i % cols, row = Math.floor(i/cols);
      const x = pad + col*(cellW+pad), y = pad + row*(cellH+labelH+pad);
      const scale = Math.max(cellW/img.naturalWidth, cellH/img.naturalHeight);
      const sw = cellW/scale, sh = cellH/scale;
      const sx = (img.naturalWidth-sw)/2, sy = (img.naturalHeight-sh)/2;
      ctx.drawImage(img, sx, sy, sw, sh, x, y, cellW, cellH);
      ctx.fillStyle = '#9498a0';
      ctx.font = '13px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(slotDef.label, x+cellW/2, y+cellH+17);
      resolve();
    };
    img.onerror = resolve;
    img.src = slots[slotDef.key];
  }));

  return Promise.all(loads).then(()=> canvas.toDataURL('image/png'));
}

function renderGenBlock(sectionEl, data, refText, onGenerate, opts){
  if(!sectionEl) return;
  opts = opts || {};
  const kind = opts.kind || 'character';
  const requireRole = opts.requireRole !== false;
  const hasBasics = !!(data.name && data.photo && data.description && (!requireRole || data.role));

  let anglesOk = true, angleHint = '';
  if(opts.requireCoreAngles){
    const filled = filledCoreAngleCount(data.angleSlots);
    const total = coreAngleCountTotal();
    anglesOk = filled >= total;
    angleHint = `${filled}/${total} core angles`;
  }

  if(!hasBasics || !anglesOk){
    const missing = [];
    if(!hasBasics) missing.push(`photo${requireRole?', role':''} and description`);
    if(!anglesOk) missing.push(`all core reference angles (${angleHint})`);
    sectionEl.innerHTML = `<div class="gen-hint">Add ${missing.join(' and ')} to generate this ${kind}'s AI reference card.</div>`;
    return;
  }

  const sheet = opts.existingSheet;
  const sheetHtml = sheet ? `<img class="turnaround-sheet-preview" src="${sheet}">` : '';

  if(refText){
    sectionEl.innerHTML = `
      <div class="ref-status"><span class="dot2"></span>Reference card generated</div>
      ${sheetHtml}
      <div class="ref-card-box">${refText}</div>
      <div class="ref-actions">
        <button class="cf-btn" id="genRegenBtn">Regenerate <span class="gen-cost">${GEN_COST_LABEL}</span></button>
      </div>`;
    sectionEl.querySelector('#genRegenBtn').onclick = ()=> runGenBlock(sectionEl, data, onGenerate, opts);
  } else {
    sectionEl.innerHTML = `
      <button class="gen-btn" id="genBtn">Generate this ${kind} for AI use <span class="gen-cost">${GEN_COST_LABEL}</span></button>
      <div class="gen-hint">Builds a turnaround sheet from your reference photos plus a structured text card (no paid API yet — this runs locally). Future shot generations will point to this so ${kind==='location'?'the location':'this character'} stays consistent from shot to shot.</div>`;
    sectionEl.querySelector('#genBtn').onclick = ()=> runGenBlock(sectionEl, data, onGenerate, opts);
  }
}

function runGenBlock(sectionEl, data, onGenerate, opts){
  if(!sectionEl) return;
  const kind = (opts && opts.kind) || 'character';
  sectionEl.innerHTML = `<button class="gen-btn" disabled><span class="gen-spin"></span>Generating…</button>`;
  // simulated/local for now — once a paid backend (KIE) is wired up, this is where the real
  // API call goes, sending the same turnaround sheet + text this already builds.
  setTimeout(async ()=>{
    const text = buildReferenceCardText(data, kind);
    let sheet = null;
    if(opts && opts.buildSheet){
      try{ sheet = await opts.buildSheet(data); }catch(err){}
    }
    onGenerate(text, sheet);
  }, 1200);
}

      refreshFormGen();

    slotFileInput.value = '';
  };

    saveBtn.disabled = nameInput.value.trim().length===0;

  document.getElementById('cfCancel').onclick = ()=>{

      icon: 'ti-user',

      role: roleInput.value.trim(),
      description: notesInput.value.trim(),

      showCharacterCard(cat, editIdx);

      renderAssets();
      showCharacterGallery(cat);
    }
  };

async function buildMusicTrack(file){
  const buffer = await file.arrayBuffer();
  const AC = window.AudioContext || window.webkitAudioContext;
  const ctx = new AC();
  const decoded = await ctx.decodeAudioData(buffer.slice(0));
  const peaks = computeWavePeaks(decoded, 2000);
  const audioUrl = URL.createObjectURL(file);
  ctx.close && ctx.close();
  return {
    id: 't' + (trackSeq++),
    name: file.name,
    icon: 'ti-file-music',
    audioUrl,
    fullDuration: decoded.duration,
    peaks,
  };
}

function computeWavePeaks(audioBuffer, resolution){
  const ch0 = audioBuffer.getChannelData(0);
  const total = ch0.length;
  const bucketSize = Math.max(1, Math.floor(total/resolution));
  const peaks = new Array(Math.ceil(total/bucketSize));
  for(let i=0, p=0; i<total; i+=bucketSize, p++){
    let max = 0;
    const end = Math.min(i+bucketSize, total);
    for(let j=i; j<end; j++){
      const v = Math.abs(ch0[j]);
      if(v>max) max = v;
    }
    peaks[p] = max;
  }
  return peaks;
}

      e.stopPropagation();
      const idx = parseInt(e.target.closest('[data-del-idx]').dataset.delIdx, 10);
      cat.items.splice(idx,1);
      renderAssets();
      showLookGallery(cat);
    };
  });
  previewEl.querySelectorAll('.char-tile:not(.char-tile-add)').forEach(tile=>{
    tile.onclick = (e)=>{
      if(e.target.closest('.char-tile-del')) return;
      showLookForm(cat, parseInt(tile.dataset.idx, 10));
    };
  });
  document.getElementById('addLookTile').onclick = ()=> showLookForm(cat);
}

function renderLookGenSection(sectionEl, look, character){
  if(!sectionEl) return;
  const ready = !!(character && look.description && look.description.trim());
  if(!ready){
    sectionEl.innerHTML = `<div class="gen-hint">Select a character and describe the outfit to generate a preview.</div>`;
    return;
  }
  let html = '';
  if(look.previewImage){
    html += `<div class="shot-preview-thumb"><img src="${look.previewImage}"></div>`;
  }
  html += `<button class="gen-btn" id="lookGenBtn">${look.previewImage ? 'Regenerate' : 'Generate preview'} <span class="gen-cost">Free</span></button>`;
  if(!look.previewImage){
    html += `<div class="gen-hint">Uses Pollinations.ai (free) to rough out the outfit. Regenerate as many times as you like before approving.</div>`;
  } else {
    html += `<button class="cf-btn${look.approved?'':' primary'}" id="lookApproveBtn" style="width:100%;margin-top:8px;">${look.approved ? 'Approved ✓ — this is the locked look' : 'Approve this look'}</button>`;
  }
  sectionEl.innerHTML = html;

  document.getElementById('lookGenBtn').onclick = ()=>{
    sectionEl.innerHTML = `<button class="gen-btn" disabled><span class="gen-spin"></span>Generating…</button>`;
    const prompt = buildLookPrompt(character, look.description.trim());
    tryLoadImage(buildPollinationsUrl(prompt, 480, 640))
      .catch(()=> null)
      .then((url)=>{
        if(url){ look.previewImage = url; look.approved = false; }
        renderLookGenSection(sectionEl, look, character);
        renderAssets();
      });
  };
  const approveBtn = document.getElementById('lookApproveBtn');
  if(approveBtn){
    approveBtn.onclick = ()=>{
      look.approved = true;
      renderLookGenSection(sectionEl, look, character);
      renderAssets();
    };
  }
}

function showLookForm(cat, editIdx){
  pausePlayback();
  const isEdit = typeof editIdx === 'number';
  const existing = isEdit ? cat.items[editIdx] : null;
  const bandCat = state.categories.find(c=>c.key==='band');
  const characters = bandCat ? bandCat.items : [];

  previewEl.classList.remove('align-tl');
  previewEl.onclick = null;
  previewBarEl.textContent = isEdit ? 'Edit look — ' + existing.name : 'Add asset — Looks';

  const defaultName = existing ? existing.name : 'Look ' + (cat.items.length + 1);

  previewEl.innerHTML = `
    <div class="char-form">
      <h3>${isEdit ? 'Edit look' : 'New look'}</h3>
      <p class="sub">${isEdit ? 'Update this outfit.' : 'Design an outfit for one of your characters.'}</p>

      <div class="cf-field">
        <label>Name</label>
        <input type="text" id="lkName" value="${defaultName}">
      </div>
      <div class="cf-field">
        <label>Character</label>
        <select id="lkCharacter">
          <option value="">${characters.length===0 ? 'No characters yet' : 'Select character'}</option>
          ${characters.map(c=>`<option value="${c.id}" ${existing && existing.characterId===c.id ? 'selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="cf-field">
        <label>Description <span style="color:var(--text-3);font-weight:400;">— prompt for the outfit</span></label>
        <textarea id="lkDesc" placeholder="e.g. leather jacket, black t-shirt, ripped jeans">${existing && existing.description ? existing.description : ''}</textarea>
      </div>

      <div class="gen-section" id="lookGenSection"></div>

      <div class="cf-actions">
        <button class="cf-btn" id="lkCancel">Cancel</button>
        <button class="cf-btn primary" id="lkSave" ${defaultName.trim() ? '' : 'disabled'}>${isEdit ? 'Save changes' : 'Add look'}</button>
      </div>
    </div>
  `;

  const nameInput = document.getElementById('lkName');
  const charSelect = document.getElementById('lkCharacter');
  const descInput = document.getElementById('lkDesc');
  const saveBtn = document.getElementById('lkSave');

  // working copy so Cancel doesn't leave a half-generated look behind
  const draft = existing ? Object.assign({}, existing) : {
    id: null, name: defaultName, characterId: '', description: '',
    previewImage: null, approved: false,
  };

  function refreshGen(){
    draft.name = nameInput.value.trim();
    draft.characterId = charSelect.value;
    draft.description = descInput.value;
    const character = characters.find(c=>c.id===draft.characterId);
    renderLookGenSection(document.getElementById('lookGenSection'), draft, character);
  }
  nameInput.addEventListener('input', ()=>{ saveBtn.disabled = nameInput.value.trim().length===0; });
  charSelect.addEventListener('change', refreshGen);
  descInput.addEventListener('input', refreshGen);
  refreshGen();

  document.getElementById('lkCancel').onclick = ()=>{
    if(isEdit) showLookGallery(cat);
    else showLookGallery(cat);
  };
  saveBtn.onclick = ()=>{
    if(nameInput.value.trim().length===0) return;
    const data = {
      id: existing && existing.id ? existing.id : 'lk' + (lookSeq++),
      name: nameInput.value.trim(),
      characterId: charSelect.value,
      description: descInput.value.trim(),
      previewImage: draft.previewImage,
      approved: draft.approved,
    };
    if(isEdit) cat.items[editIdx] = data;
    else cat.items.push(data);
    renderAssets();
    showLookGallery(cat);
  };
}


// ---------- timeline / audio track ----------
function setTimelineAudioTrack(trackId){
  pausePlayback();
  state.timelineAudio = { trackId, trimIn:0, trimOut:null, volume:1 };
  const musicCat = state.categories.find(c=>c.key==='music');
  const track = musicCat.items.find(t=>t.id===trackId);
  if(track) state.timelineAudio.trimOut = track.fullDuration;
  renderTimeline();
}

function renderTimeline(){
  const musicCat = state.categories.find(c=>c.key==='music');
  const waveformWrap = document.getElementById('waveformWrap');
  if(!waveformWrap) return;
  renderMixerPanel();

  if(state.timelineAudio){
    const track = musicCat.items.find(t=>t.id===state.timelineAudio.trackId);
    if(track){ renderRealAudioTrack(track); wireWaveformDropZone(); return; }
    state.timelineAudio = null;
  }

  // legacy placeholder track (no real audio bytes — kept so existing projects still show something)
  const track = musicCat.items.find(it=>!it.id) || musicCat.items[0];
  if(!track){
    waveformWrap.innerHTML = `<div class="no-track">No music track added. Add one from the Music library on the left, or drag a track here.</div>`;
    wireWaveformDropZone();
    return;
  }
  waveformWrap.innerHTML = `
    <div class="waveform">
      <div class="audio-sticky-label"><div class="audio-sticky-label-inner">
        <span class="track-name"><i class="ti ti-music"></i> ${track.name}</span>
      </div></div>
      <canvas class="wave-canvas" id="wave"></canvas>
    </div>`;
  requestAnimationFrame(drawWave);
  wireWaveformDropZone();
}

function wireWaveformDropZone(){
  const waveformWrap = document.getElementById('waveformWrap');
  if(!waveformWrap) return;
  waveformWrap.addEventListener('dragover', (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
  waveformWrap.addEventListener('drop', (e)=>{
    e.preventDefault();
    const id = e.dataTransfer.getData('text/plain');
    if(!id) return;
    const musicCat = state.categories.find(c=>c.key==='music');
    const track = musicCat.items.find(t=>t.id===id);
    if(track) setTimelineAudioTrack(track.id);
  });
}

function renderRealAudioTrack(track){
  const waveformWrap = document.getElementById('waveformWrap');
  if(!waveformWrap) return;
  const ta = state.timelineAudio;
  const clipWidth = Math.max(20, Math.round((ta.trimOut - ta.trimIn) * PX_PER_SEC));
  waveformWrap.innerHTML = `
    <div class="waveform real-audio">
      <div class="audio-sticky-label"><div class="audio-sticky-label-inner">
        <span class="track-name"><i class="ti ti-music"></i> ${track.name}</span>
      </div></div>
      <div class="audio-clip-wrap" id="audioClipWrap" style="width:${clipWidth}px;">
        <canvas class="wave-canvas" id="wave"></canvas>
        <div class="shot-trim left" id="audioTrimLeft" title="Trim start"></div>
        <div class="shot-trim right" id="audioTrimRight" title="Trim end"></div>
      </div>
    </div>`;
  requestAnimationFrame(()=> drawRealWave(track, ta.trimIn, ta.trimOut));

  const clipWrap = document.getElementById('audioClipWrap');
  function wireAudioTrim(handleId, side){
    const handle = document.getElementById(handleId);
    handle.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      const startX = e.clientX;
      const startIn = ta.trimIn, startOut = ta.trimOut;
      const MIN_SEC = 1;
      handle.setPointerCapture(e.pointerId);
      document.body.style.cursor = 'ew-resize';
      const onMove = (ev)=>{
        const deltaSec = ((ev.clientX - startX) / ZOOM) / PX_PER_SEC;
        if(side==='right'){
          ta.trimOut = Math.max(startIn+MIN_SEC, Math.min(track.fullDuration, startOut + deltaSec));
        } else {
          ta.trimIn = Math.max(0, Math.min(startOut-MIN_SEC, startIn + deltaSec));
        }
        const wpx = Math.max(20, Math.round((ta.trimOut - ta.trimIn) * PX_PER_SEC));
        clipWrap.style.width = wpx + 'px';
        drawRealWave(track, ta.trimIn, ta.trimOut);
      };
      const onUp = ()=>{
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
        document.body.style.cursor = '';
      };
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
    });
  }
  wireAudioTrim('audioTrimLeft', 'left');
  wireAudioTrim('audioTrimRight', 'right');
}

function drawRealWave(track, trimIn, trimOut){
  const canvas = document.getElementById('wave');
  if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w===0) return;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#3f6b4f';
  const peaks = track.peaks;
  const total = peaks.length;
  const startIdx = Math.max(0, Math.floor((trimIn/track.fullDuration) * total));
  const endIdx = Math.min(total, Math.ceil((trimOut/track.fullDuration) * total));
  const visibleCount = Math.max(1, endIdx-startIdx);
  const step = 3;
  const bars = Math.floor(w/step);
  for(let i=0;i<bars;i++){
    const idx = startIdx + Math.floor((i/bars) * visibleCount);
    const amp = peaks[Math.min(idx, total-1)] || 0;
    const bh = Math.max(2, amp*h);
    ctx.fillRect(i*step, (h-bh)/2, 2, bh);
  }
}

function drawWave(){
  const canvas = document.getElementById('wave');
  if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const bars = Math.floor(w/3);
  ctx.fillStyle = '#3f6b4f';
  let seed = 42;
  function rnd(){ seed = (seed*9301+49297)%233280; return seed/233280; }
  for(let i=0;i<bars;i++){
    const amp = (Math.sin(i*0.12)*0.3+0.5) * (0.4+rnd()*0.6);
    const bh = Math.max(2, amp*h);
    ctx.fillRect(i*3, (h-bh)/2, 2, bh);
  }
}

refreshMainPreview();

  document.querySelectorAll('.item.selected').forEach(el=>el.classList.remove('selected'));
  pausePlayback();
  refreshMainPreview();
}

document.getElementById('playBtn2').onclick = startPlayback;
document.getElementById('pauseBtn2').onclick = pausePlayback;
document.getElementById('stopBtn2').onclick = stopPlayback;
updateTransportButtons();

  timelineMode = 'assembly';
  document.getElementById('modeAssemblyBtn').classList.add('active');
  document.getElementById('modeEditBtn').classList.remove('active');
  renderTimelineScenes();
};
document.getElementById('modeEditBtn').onclick = ()=>{
  timelineMode = 'edit';
  document.getElementById('modeEditBtn').classList.add('active');
  document.getElementById('modeAssemblyBtn').classList.remove('active');
  renderTimelineScenes();
};
window.addEventListener('keydown', (e)=>{
  const tag = document.activeElement && document.activeElement.tagName;
  const inField = tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT' || (document.activeElement && document.activeElement.isContentEditable);
  if(e.code==='Space'){
    if(inField) return;
    e.preventDefault();
    if(isPlaying) pausePlayback(); else startPlayback();
  } else if(e.code==='Escape'){
    if(inField){ document.activeElement.blur(); return; }
    goHome();
  }
});
window.addEventListener('resize', drawWave);
